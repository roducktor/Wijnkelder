<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Sectio">
<title>Sectio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --black:#0A0A0A;--black2:#141414;--black3:#1C1C1C;--black4:#242424;
  --gold:#C4922A;--gold-light:#E8B84B;
  --white:#FFFFFF;--white2:#E8E4DC;--muted:#555555;--muted2:#333333;
  --r:20px;--rs:12px;
  --c-rood:#C20114;--c-wit:#2D4A6B;--c-rose:#7B2D5A;--c-rosé:#7B2D5A;
  --c-mousserende:#1A5C3A;--c-dessertwijn:#6B3A1F;
  --c-whisky:#C4922A;--c-rum:#3D1F6B;--c-cognac:#8B3A1F;--c-gin:#1F5A3A;--c-overig:#3A3A3A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Space Grotesk',sans-serif;}
body{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh;}

/* HEADER */
header{background:var(--black);padding:20px 20px 0;position:sticky;top:0;z-index:50;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.wordmark{font-size:20px;font-weight:900;letter-spacing:5px;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.sync-dot.err{background:#C20114;}.sync-dot.spin{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.version{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}

/* HERO */
.hero{padding:0 0 20px;overflow:hidden;}
.hero-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.hero-number{font-size:54px;font-weight:900;line-height:1;letter-spacing:-2px;}
.hero-number span{font-size:22px;color:var(--muted);font-weight:500;letter-spacing:0;}
.mini-stats{display:flex;gap:8px;margin-top:14px;}
.ms{background:var(--black3);border-radius:var(--rs);padding:12px 14px;flex:1;}
.ms-val{font-size:20px;font-weight:700;color:var(--gold);}
.ms-label{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--black3);}
.tab{flex:1;padding:10px 0;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-bottom:-1px;}
.tab.active{color:var(--white);border-bottom-color:var(--gold);}

main{flex:1;overflow-y:auto;padding-bottom:2rem;background:var(--black);}

/* SEARCH */
.search-row{margin:14px 20px 10px;background:var(--black3);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.search-row input{background:none;border:none;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;flex:1;}
.search-row input::placeholder{color:var(--muted);}

/* FILTER PILLS */
.filter-pills{display:flex;gap:7px;padding:0 20px 16px;overflow-x:auto;}
.filter-pills::-webkit-scrollbar{display:none;}
.fpill{background:none;color:var(--muted);border:1px solid var(--muted2);border-radius:30px;padding:5px 14px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;font-family:'Space Grotesk',sans-serif;}
.fpill.active{background:var(--white);color:var(--black);border-color:var(--white);}

/* CARD STACK */
.card-stack{padding:0 16px;}
.card-outer{position:relative;margin-bottom:10px;}
.card-outer:last-child{margin-bottom:0;}

.drink-card{border-radius:var(--r);padding:16px 18px;cursor:pointer;position:relative;z-index:2;transition:opacity .15s;}
.drink-card:active{opacity:.85;}

.dc-rood{background:var(--c-rood);}.dc-wit{background:var(--c-wit);}
.dc-rose,.dc-rosé{background:var(--c-rose);}.dc-mousserende{background:var(--c-mousserende);}
.dc-dessertwijn{background:var(--c-dessertwijn);}.dc-whisky{background:var(--c-whisky);}
.dc-rum{background:var(--c-rum);}.dc-cognac{background:var(--c-cognac);}
.dc-gin{background:var(--c-gin);}.dc-overig{background:var(--c-overig);}

.dc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.dc-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.6);}
.dc-badge{font-size:10px;font-weight:700;background:rgba(0,0,0,.25);border-radius:30px;padding:4px 12px;color:rgba(255,255,255,.8);}
.dc-dark .dc-type{color:rgba(0,0,0,.55);}.dc-dark .dc-badge{color:rgba(0,0,0,.7);}
.dc-dark .dc-name{color:#000;}.dc-dark .dc-producer{color:rgba(0,0,0,.45);}
.dc-dark .dc-region{color:rgba(0,0,0,.4);}.dc-dark .dc-score{color:#000;}
.dc-dark .dc-stars{color:rgba(0,0,0,.5);}
.dc-name{font-size:24px;font-weight:900;line-height:1.05;letter-spacing:-.5px;margin-bottom:3px;}
.dc-producer{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:16px;}
.dc-footer{display:flex;justify-content:space-between;align-items:flex-end;}
.dc-region{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);}
.dc-score{font-size:40px;font-weight:900;line-height:1;letter-spacing:-2px;}
.dc-stars{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:2px;text-align:right;margin-top:2px;}
.dc-no-score{font-size:11px;color:rgba(255,255,255,.25);padding-bottom:8px;}

/* CARD PHOTO */
.dc-photo{width:56px;height:56px;object-fit:cover;border-radius:10px;flex-shrink:0;opacity:.9;}

/* EXPAND */
.card-expand{overflow:hidden;max-height:0;transition:max-height .5s cubic-bezier(.16,1,.3,1);margin-top:-2px;position:relative;z-index:1;}
.card-expand.open{max-height:1400px;}
.card-outer.expanded .drink-card{border-radius:var(--r) var(--r) 0 0;}
.card-expand.open{border-radius:0 0 var(--r) var(--r);}
.expand-inner{padding-bottom:4px;}
.expand-close{display:flex;justify-content:flex-end;padding:10px 16px 4px;}
.expand-close button{background:none;border:none;color:rgba(255,255,255,.4);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.exp-section{padding:12px 18px;border-top:1px solid rgba(0,0,0,.2);}
.exp-label{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px;}
.exp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(0,0,0,.15);}
.exp-item{padding:12px 18px;border-right:1px solid rgba(0,0,0,.2);border-bottom:1px solid rgba(0,0,0,.2);}
.exp-item:nth-child(3n){border-right:none;}
.exp-val{font-size:18px;font-weight:700;color:#fff;}
.exp-stars-row{display:flex;align-items:center;justify-content:space-between;}
.exp-stars{font-size:18px;color:rgba(255,255,255,.7);letter-spacing:3px;}
.exp-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid rgba(0,0,0,.15);}
.exp-btn{flex:1;height:44px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.9);border:none;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}
.exp-btn:active{opacity:.75;}
.exp-btn.primary{background:rgba(255,255,255,.9);color:var(--expand-text,#000);flex:1.4;}
.exp-btn.danger{background:rgba(0,0,0,.15);color:rgba(255,255,255,.45);}
.note-entry{padding:10px 0;border-bottom:1px solid rgba(0,0,0,.15);}
.note-entry:last-child{border-bottom:none;}
.note-date{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:3px;}
.note-text{font-size:13px;color:rgba(255,255,255,.65);line-height:1.5;}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:8px;}
.empty-sub{font-size:13px;line-height:1.6;}

/* LOGBOEK */
.log-card{background:var(--black2);margin:0 16px 10px;border-radius:var(--r);padding:16px;cursor:pointer;}
.lc-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.lc-meta{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.lc-stars{color:var(--gold);font-size:13px;letter-spacing:2px;margin-bottom:6px;}
.lc-text{font-size:13px;color:var(--muted);line-height:1.6;}
.logboek-empty{text-align:center;padding:3rem 2rem;color:var(--muted);}

/* ADD/SCANNER TAB */
.add-choice{padding:24px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;}


.add-choice-btns{display:flex;flex-direction:column;gap:12px;width:100%;}
.add-choice-btn{background:var(--black2);border:none;border-radius:var(--r);padding:24px 20px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:16px;font-family:'Space Grotesk',sans-serif;}
.add-choice-btn:active{background:var(--black3);}
.acb-icon{width:52px;height:52px;background:var(--black3);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0;}
.acb-label{font-size:17px;font-weight:700;color:var(--white);margin-bottom:4px;}
.acb-sub{font-size:12px;color:var(--muted);line-height:1.4;}
.scan-flow-header{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--black3);}
.scan-back-btn{background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.scan-flow-title{font-size:14px;font-weight:700;}
.scan-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.scan-big-btn{height:54px;background:var(--black2);color:var(--white);border:none;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-preview-wrap{display:none;padding:0 16px 16px;}
.scan-preview-wrap img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r);margin-bottom:12px;}
.analyzing-indicator{display:flex;align-items:center;justify-content:center;padding:14px;gap:4px;}
.analyzing-text{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.analyzing-dots::after{content:'';animation:adots 1.2s infinite;color:var(--gold);font-weight:700;}
@keyframes adots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';}}
.btn-scan-ai{width:100%;height:50px;background:var(--black3);color:var(--muted);border:none;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-result{display:none;padding:0 16px 16px;}
.scan-result-inner{background:var(--black2);border-radius:var(--r);overflow:hidden;}
.src-name{font-size:22px;font-weight:900;padding:18px 18px 4px;}
.src-meta{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 18px 14px;border-bottom:1px solid var(--black3);}
.sc-block{padding:12px 18px;border-bottom:1px solid var(--black3);}
.sc-block-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--black3);}
.sc-label{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.sc-block-row .sc-label{margin-bottom:0;}
.sc-val{font-size:13px;color:var(--white2);line-height:1.6;}
.sc-block-row .sc-val{font-size:13px;color:var(--white);text-align:right;max-width:55%;}
.scan-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 18px 18px;}
.scan-action-btn{height:50px;background:var(--black3);color:var(--white);border:none;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-action-btn.primary{background:var(--gold);color:var(--black);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:var(--black2);max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--black3);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--black2);z-index:10;}
.modal-title{font-size:18px;font-weight:900;letter-spacing:-.3px;}
.modal-close{background:var(--black3);border:none;color:var(--white);cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;flex:1;}
.fg{margin-bottom:20px;}
.fl{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
.fi{width:100%;height:46px;padding:0 16px;border:none;border-bottom:1px solid var(--black3);background:var(--black3);border-radius:var(--rs);font-size:15px;color:var(--white);font-family:'Space Grotesk',sans-serif;outline:none;}
.fi::placeholder{color:var(--muted);}
.fsel{width:100%;height:46px;padding:0 16px;border:none;background:var(--black3);border-radius:var(--rs);font-size:14px;color:var(--white);font-family:'Space Grotesk',sans-serif;outline:none;}
.fsel option,.fsel optgroup{background:var(--black2);}
.fta{width:100%;padding:14px 16px;border:none;background:var(--black3);border-radius:var(--rs);font-size:14px;color:var(--white);font-family:'Space Grotesk',sans-serif;resize:none;min-height:90px;line-height:1.5;outline:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn-scan-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.btn-scan{height:46px;border:1px solid var(--black3);background:var(--black3);color:var(--white);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.btn-ai-fetch{width:100%;height:42px;background:none;border:1px solid var(--black3);color:var(--muted);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);margin-top:8px;}
.ai-prev{background:rgba(196,146,42,.08);border:1px solid rgba(196,146,42,.2);border-radius:var(--rs);padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px;display:none;}
.ai-prev.show{display:block;}
.ppw{display:none;margin-bottom:10px;}
.ppw img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);}
.modal-footer{padding:16px 20px;border-top:1px solid var(--black3);display:flex;gap:8px;position:sticky;bottom:0;background:var(--black2);}
.btn-save{flex:1;height:50px;background:var(--gold);color:var(--black);border:none;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}
.btn-cancel{height:50px;padding:0 16px;background:var(--black3);color:var(--muted);border:none;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}
.btn-delete{height:50px;padding:0 16px;background:none;border:1px solid rgba(194,1,20,.4);color:rgba(194,1,20,.8);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}

/* DRINK MODAL */
.drink-amount-btn{height:42px;border:1px solid var(--black3);background:var(--black3);color:var(--muted);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}
.drink-amount-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}
.drink-star{background:none;border:none;cursor:pointer;font-size:28px;color:var(--black3);padding:2px;line-height:1;}
.drink-star.lit{color:var(--gold);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black4);color:var(--white);padding:10px 20px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;z-index:999;transition:transform .25s;white-space:nowrap;pointer-events:none;border-radius:30px;border:1px solid var(--black3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading-txt{color:var(--muted);font-size:12px;font-style:italic;}
.stack-end{height:30px;}
</style>
</head>
<body>
<div id="app" style="display:none;flex-direction:column;min-height:100dvh">
  <header>
    <div class="header-top">
      <div class="wordmark">SECTIO</div>
      <div class="header-right">
        <span class="version" id="slbl">v0.44</span>
        <span class="sync-dot spin" id="sdot"></span>
      </div>
    </div>
    <div class="hero" id="hero-section">
      <div class="hero-label">Totale collectie</div>
      <div class="hero-number" id="hero-num">0 <span>flessen</span></div>
      <div class="mini-stats">
        <div class="ms"><div class="ms-val" id="ms-score">—</div><div class="ms-label">Score</div></div>
        <div class="ms"><div class="ms-val" id="ms-val">€0</div><div class="ms-label">Waarde</div></div>
        <div class="ms"><div class="ms-val" id="ms-logs">0</div><div class="ms-label">Logs</div></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-btn-kelder" onclick="switchTab('kelder',this)">Collectie</button>
      <button class="tab" id="tab-btn-reviews" onclick="switchTab('reviews',this)">Logboek</button>
      <button class="tab" id="tab-btn-scanner" onclick="switchTab('scanner',this)">+ Toevoegen</button>
    </div>
  </header>

  <main id="main-scroll">
    <!-- COLLECTIE -->
    <div id="tab-kelder">
      <div class="search-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" placeholder="Zoek drank, producent, regio" oninput="renderList()">
      </div>
      <div class="filter-pills">
        <button class="fpill active" onclick="setFilter(this,'')">Alles</button>
        <button class="fpill" onclick="setFilter(this,'Rood')">Rood</button>
        <button class="fpill" onclick="setFilter(this,'Wit')">Wit</button>
        <button class="fpill" onclick="setFilter(this,'Whisky')">Whisky</button>
        <button class="fpill" onclick="setFilter(this,'Rum')">Rum</button>
        <button class="fpill" onclick="setFilter(this,'Cognac')">Cognac</button>
        <button class="fpill" onclick="setFilter(this,'Gin')">Gin</button>
      </div>
      <div class="card-stack" id="wine-list"></div>
      <div class="stack-end"></div>
    </div>

    <!-- LOGBOEK -->
    <div id="tab-reviews" style="display:none">
      <div style="padding:20px 16px 10px">
        <div style="font-size:24px;font-weight:900;margin-bottom:4px">Logboek</div>
        <div style="font-size:12px;color:var(--muted)">Gelogde proeverijen</div>
      </div>
      <div id="reviews-list"></div>
    </div>

    <!-- TOEVOEGEN/SCANNER -->
    <div id="tab-scanner" style="display:none">
      <!-- Choice screen -->
      <div class="add-choice" id="add-choice">
        <div class="add-choice-btns">
          <button class="add-choice-btn" onclick="startScan()">
            <div class="acb-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <div><div class="acb-label">Scan etiket</div><div class="acb-sub">Maak een foto of kies uit galerij</div></div>
          </button>
          <button class="add-choice-btn" onclick="openModal()">
            <div class="acb-icon">

function imgToJpeg(file,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var d=e.target.result;
    if(!d||d.indexOf(',')===-1){cb(null,null,'Foto laden mislukt.');return;}
    cb(d.split(',')[1],d);
  };
  reader.onerror=function(){cb(null,null,'Foto laden mislukt.');};
  reader.readAsDataURL(file);
}

function renderAll(){renderStats();renderList();}

function renderStats(){
  var total=wines.reduce(function(s,w){return s+(w.bottles||0);},0);
  var rated=wines.filter(function(w){return w.rating;});
  var avg=rated.length?(rated.reduce(function(s,w){return s+w.rating;},0)/rated.length).toFixed(1):'--';
  var val=wines.reduce(function(s,w){return s+(w.price||0)*(w.bottles||0);},0);
  var logs=wines.filter(function(w){return w.notes;}).length;
  document.getElementById('hero-num').innerHTML=total+' <span>flessen</span>';
  document.getElementById('ms-score').textContent=avg;
  document.getElementById('ms-val').textContent='€'+Math.round(val);
  document.getElementById('ms-logs').textContent=logs;
}

function renderList(){
  var q=(document.getElementById('search-input').value||'').toLowerCase();
  var list=wines.filter(function(w){
    return [w.name,w.producer,w.region,w.year].join(' ').toLowerCase().indexOf(q)>=0
      &&(!activeTypeFilter||w.type===activeTypeFilter);
  });
  var el=document.getElementById('wine-list');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-title">'+(wines.length?'Geen resultaten':'Collectie is leeg')+'</div><div class="empty-sub">'+(wines.length?'Probeer een andere zoekterm.':'Voeg uw eerste fles toe.')+'</div></div>';
    return;

    var tk=typeKey(w.type);
    var isDark=DARK_TYPES.indexOf(tk)>=0;
    var dc=isDark?' style="color:#000"':'';
    var stars=w.rating?'★'.repeat(w.rating)+'☆'.repeat(5-w.rating):'';

    var nextColor=nextW?getCardColor(nextW.type):'';

      +'<div class="drink-card dc-'+tk+'" onclick="toggleCard(\''+w.id+'\')">'
      +'<div class="dc-header">'
      +'<span class="dc-type"'+dc+'>'+(w.type||'')+(w.region?' · '+w.region:'')+'</span>'
      +'<span class="dc-badge"'+dc+'>'+(w.bottles||0)+' fl.</span>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="dc-name"'+dc+'>'+(w.name||'')+(w.year?' <span style="font-weight:400;opacity:.6">'+w.year+'</span>':'')+'</div>'
      +'<div class="dc-producer"'+dc+'>'+(w.producer||'')+'</div>'
      +'</div>'
      +(w.photo?'<img src="'+w.photo+'" style="width:56px;height:56px;object-fit:cover;border-radius:10px;flex-shrink:0;opacity:.9">':'')
      +'</div>'
      +'<div class="dc-footer">'
      +'<div><div class="dc-region"'+dc+'>'+(w.drink_from?w.drink_from+'–'+(w.drink_to||'?'):(w.region||''))+'</div></div>'
      +'<div>'+(w.rating?'<div class="dc-score"'+dc+'>'+w.rating+'</div><div class="dc-stars"'+dc+'>'+stars+'</div>':'<div class="dc-no-score">Niet beoordeeld</div>')+'</div>'
      +'</div></div></div>';

var openCardId=null;

function toggleCard(id){
  if(openCardId===id){closeCard(id);return;}
  if(openCardId) closeCard(openCardId);
  openCardId=id;detailId=id;
  var w=wines.find(function(x){return x.id===id;});
  if(!w) return;
  var tk=typeKey(w.type);
  var color=getCardColor(w.type);
  var isDark=DARK_TYPES.indexOf(tk)>=0;
  var s5=w.rating||0;
  var sh='★'.repeat(s5)+'☆'.repeat(5-s5);
  var notesHtml='';
  if(w.notes){
    w.notes.split('\n---\n').reverse().forEach(function(e){
      var ls=e.split('\n');
      notesHtml+='<div class="note-entry"><div class="note-date">'+(ls[0]||'')+'</div>'
        +(ls.slice(1).join('\n')?'<div class="note-text">'+ls.slice(1).join('<br>')+'</div>':'')
        +'</div>';
    });
  }
  var expandHtml=''
    +'<div class="expand-inner">'
    +'<div class="expand-close"><button onclick="closeCard(\''+id+'\')">✕ Sluiten</button></div>'
    +'<div class="exp-grid">'
    +'<div class="exp-item"><div class="exp-label">Score</div><div class="exp-val">'+(w.rating?w.rating+'/5':'—')+'</div></div>'

    +'<div class="exp-item"><div class="exp-label">Waarde</div><div class="exp-val">'+(w.price?'€'+((w.price)*(w.bottles||0)).toFixed(0):'—')+'</div></div>'
    +(w.drink_from?'<div class="exp-item"><div class="exp-label">Drinkvenster</div><div class="exp-val">'+w.drink_from+'–'+(w.drink_to||'?')+'</div></div>':'<div class="exp-item"></div>')
    +'</div>'
    +'<div class="exp-section exp-stars-row">'
    +'<div class="exp-label">Beoordeling</div>'
    +'<div class="exp-stars">'+(w.rating?'★'.repeat(w.rating)+'☆'.repeat(5-w.rating):'☆☆☆☆☆')+'</div>'
    +'</div>'
    +(w.notes?'<div class="exp-section"><div class="exp-label">Notities</div>'+notesHtml+'</div>':'')
    +'<div class="exp-actions">'
    +'<button class="exp-btn" onclick="addFles(\''+id+'\')">+ Fles</button>'
    +'<button class="exp-btn primary" onclick="drinkFles(\''+id+'\')">Loggen</button>'
    +'<button class="exp-btn" onclick="openModal(\''+id+'\')">Bewerk</button>'
    +(w.notes?'<button class="exp-btn danger" onclick="clearNotes(\''+id+'\')">Wis logs</button>':'')
    +'</div>'
    +'</div>';
  var outer=document.getElementById('card-'+id);
  if(!outer) return;
  outer.classList.add('expanded');
  var panel=document.createElement('div');
  panel.id='expand-'+id;
  panel.className='card-expand';

function closeCard(id){
  var panel=document.getElementById('expand-'+id);
  var outer=document.getElementById('card-'+id);
  if(panel){
    panel.classList.remove('open');
    // Remove expanded (border-radius) just before panel fully closes
    setTimeout(function(){if(outer) outer.classList.remove('expanded');},380);
    setTimeout(function(){if(panel.parentNode) panel.parentNode.removeChild(panel);},420);
  } else {
    if(outer) outer.classList.remove('expanded');
  }
  if(openCardId===id) openCardId=null;
  detailId=null;
}

async function saveDrinkLog(){
  var id=document.getElementById('drink-wine-id').value;
  var note=document.getElementById('drink-note').value.trim();
  var w=wines.find(function(x){return x.id===id;});
  if(!w) return;
  var date=new Date().toLocaleDateString('nl-NL');
  var logEntry='['+date+'] '+currentDrinkAmount;
  if(currentDrinkRating) logEntry+=' '+Array(currentDrinkRating+1).join('★')+Array(6-currentDrinkRating).join('☆');
  if(note) logEntry+='\n'+note;
  w.notes=(w.notes?w.notes+'\n---\n':'')+logEntry;
  if(currentDrinkRating) w.rating=currentDrinkRating;
  if(currentDrinkAmount==='fles') w.bottles=Math.max(0,(w.bottles||0)-1);
  document.getElementById('drink-modal').classList.remove('open');
  if(openCardId===id) closeCard(id);
  await saveToDB({id:id,name:w.name,type:w.type,year:w.year,producer:w.producer,
    region:w.region,bottles:w.bottles,price:w.price,drinkFrom:w.drink_from,
    drinkTo:w.drink_to,rating:w.rating,notes:w.notes,aiInfo:w.ai_info,photo:w.photo});
}

  w.bottles=(w.bottles||0)+1;

    region:w.region,bottles:w.bottles,price:w.price,drinkFrom:w.drink_from,

}

  if(openCardId===id) closeCard(id);
  await saveToDB({id:id,name:w.name,type:w.type,year:w.year,producer:w.producer,
    region:w.region,bottles:w.bottles,price:w.price,drinkFrom:w.drink_from,
    drinkTo:w.drink_to,rating:w.rating,notes:'',aiInfo:w.ai_info,photo:w.photo});
}

function renderReviews(){
  var logged=wines.filter(function(w){return w.rating||w.notes;})
    .sort(function(a,b){return(b.rating||0)-(a.rating||0);});
  var el=document.getElementById('reviews-list');
  if(!logged.length){
    el.innerHTML='<div class="empty"><div class="empty-title">Geen logs</div><div class="empty-sub">Log een drank om hier te verschijnen.</div></div>';
    return;
  }
  el.innerHTML=logged.map(function(w){
    var tk=typeKey(w.type);
    var isDark=DARK_TYPES.indexOf(tk)>=0;
    var dc=isDark?' style="color:#000"':'';
    var lastNote='';
    if(w.notes){
      var entries=w.notes.split('\n---\n');
      var last=entries[entries.length-1];
      var ls=last.split('\n');
      lastNote=(ls[1]||ls[0]||'').substring(0,90);
    }
    return '<div class="drink-card dc-'+tk+'" onclick="goToDetail(this)" data-id="'+w.id+'" style="margin:0 16px 10px;border-radius:var(--r)">'
      +'<div class="dc-header">'
      +'<span class="dc-type"'+dc+'>'+(w.type||'')+(w.region?' · '+w.region:'')+(w.year?' '+w.year:'')+'</span>'
      +(w.rating?'<span class="dc-badge"'+dc+'>'+w.rating+'/5</span>':'<span class="dc-badge"'+dc+'>—</span>')
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
      +'<div class="dc-name"'+dc+'>'+(w.name||'')+'</div>'
      +(w.photo?'<img src="'+w.photo+'" style="width:48px;height:48px;object-fit:cover;border-radius:8px;flex-shrink:0">':'')
      +'</div>'
      +(lastNote?'<div style="font-size:12px;margin-top:8px;line-height:1.5;opacity:.6"'+dc+'>'+lastNote+(lastNote.length>=90?'…':'')+'</div>':'')
      +'</div>';
  }).join('');
}

function goToDetail(el){
  var id=el.dataset?el.dataset.id:el;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===0);});
  ['kelder','reviews','scanner'].forEach(function(t,i){
    document.getElementById('tab-'+t).style.display=i===0?'block':'none';
  });
  setTimeout(function(){toggleCard(id);},100);
}

function openModal(id){
  editId=id||null;starRating=0;
  document.getElementById('modal-title').textContent=id?'Bewerken':'Toevoegen';
  document.getElementById('btn-del').style.display=id?'block':'none';
  document.getElementById('scan-prev').className='ai-prev';
  document.getElementById('ai-prev').className='ai-prev';
  photoB64=null;
  document.getElementById('ppw').style.display='none';
  document.getElementById('inp-cam').value='';
  document.getElementById('inp-gal').value='';
  if(id){
    var w=wines.find(function(x){return x.id===id;});
    document.getElementById('f-name').value=w.name||'';
    document.getElementById('f-type').value=w.type||'Rood';
    document.getElementById('f-year').value=w.year||'';
    document.getElementById('f-producer').value=w.producer||'';
    document.getElementById('f-region').value=w.region||'';
    document.getElementById('f-bottles').value=w.bottles||1;
    document.getElementById('f-price').value=w.price||'';
    document.getElementById('f-dfrom').value=w.drink_from||'';
    document.getElementById('f-dto').value=w.drink_to||'';
    document.getElementById('f-notes').value=w.notes||'';
    starRating=w.rating||0;
  } else {
    ['f-name','f-year','f-producer','f-region','f-price','f-dfrom','f-dto','f-notes']
      .forEach(function(i){document.getElementById(i).value='';});
    document.getElementById('f-type').value='Rood';
    document.getElementById('f-bottles').value=1;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function handlePhoto(input){
  var file=input.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var d=e.target.result;
    photoB64=d.split(',')[1];
    scannedPhotoForSave=d;
    document.getElementById('pimg').src=d;
    document.getElementById('ppw').style.display='block';
    document.getElementById('scan-prev').className='ai-prev';
    scanLabel();
  };
  reader.readAsDataURL(file);
}

async function scanLabel(){
  if(!photoB64) return;
  var el=document.getElementById('scan-prev');
  el.className='ai-prev show';el.textContent='Analyseren…';
  try{
    var res=await fetch(AAPI,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:600,
        system:'Analyseer het etiket. Antwoord ALLEEN met JSON: {"name":"","producer":"","region":"","year":null,"type":"Rood of Wit of Rose of Mousserende of Dessertwijn of Whisky of Rum of Cognac of Gin of Overig"}',
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:photoB64}},
          {type:'text',text:'Wat staat er op dit etiket? Geef JSON.'}
        ]}]})});
    var data=await res.json();
    if(data.error){el.textContent='Fout: '+data.error.message;return;}
    var txt=data.content?data.content.map(function(c){return c.text||'';}).join(''):'';
    var w;try{var m=txt.match(/\{[\s\S]*\}/);w=JSON.parse(m?m[0]:txt);}catch(e){el.textContent=txt;return;}
    if(!w.name&&w.producer) w.name=w.producer;
    if(w.name) document.getElementById('f-name').value=w.name;
    if(w.producer) document.getElementById('f-producer').value=w.producer;
    if(w.region) document.getElementById('f-region').value=w.region;
    if(w.year) document.getElementById('f-year').value=w.year;
    if(w.type) document.getElementById('f-type').value=w.type;
    el.className='ai-prev';
    toast('Etiket herkend');
  }catch(e){el.textContent='Fout: '+e.message;}
}

async function fetchAI(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){alert('Vul eerst een naam in.');return;}
  var el=document.getElementById('ai-prev');
  el.className='ai-prev show';el.textContent='Info ophalen…';
  var info=await claudeText('Vertel beknopt over: "'+name+'". Geef: herkomst, druivenras of graan, smaakprofiel (2 zinnen), serveertemperatuur. In het Nederlands, eindig met volledige zin.',800);
  el.textContent=info||'Geen info beschikbaar.';
}

async function saveWine(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){alert('Naam is verplicht.');return;}
  var btn=document.querySelector('#modal .btn-save');
  btn.textContent='Opslaan…';btn.disabled=true;
  var existingAI=editId?((wines.find(function(w){return w.id===editId;})||{}).ai_info||null):(scannedAiInfo||null);
  scannedAiInfo=null;
  var ok=await saveToDB({id:editId||null,name:name,
    type:document.getElementById('f-type').value,
    year:parseInt(document.getElementById('f-year').value)||null,
    producer:document.getElementById('f-producer').value,
    region:document.getElementById('f-region').value,
    bottles:parseInt(document.getElementById('f-bottles').value)||1,
    price:parseFloat(document.getElementById('f-price').value)||null,
    drinkFrom:parseInt(document.getElementById('f-dfrom').value)||null,
    drinkTo:parseInt(document.getElementById('f-dto').value)||null,
    rating:starRating||null,
    notes:document.getElementById('f-notes').value,
    aiInfo:existingAI,
    photo:scannedPhotoForSave||null});
  scannedPhotoForSave=null;
  btn.textContent='Opslaan';btn.disabled=false;
  if(ok){closeModal();toast('Opgeslagen');}
}

async function deleteWine(){
  if(!confirm('Verwijderen?')) return;
  await delFromDB(editId);
  closeModal();closeDetail();toast('Verwijderd');
}

function startScan(){
  document.getElementById('add-choice').style.display='none';
  document.getElementById('scan-flow').style.display='block';
}

function resetScanFlow(){
  document.getElementById('add-choice').style.display='flex';
  document.getElementById('scan-flow').style.display='none';
  document.getElementById('sc-preview-wrap').style.display='none';
  document.getElementById('sc-result').style.display='none';
  document.getElementById('analyzing-indicator').style.display='none';
  document.getElementById('scan-analyze-btn').style.display='none';
  scPhotoB64=null;
}

function handleScanPhoto(input){
  var file=input.files[0];if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    scPhotoB64=e.target.result.split(',')[1];
    document.getElementById('sc-preview-img').src=e.target.result;
    document.getElementById('sc-preview-wrap').style.display='block';
    document.getElementById('sc-result').style.display='none';
    document.getElementById('add-choice').style.display='none';
    document.getElementById('scan-flow').style.display='block';
    doWinkelScan();
  };
  reader.readAsDataURL(file);
}

async function doWinkelScan(){
  if(!scPhotoB64) return;
  document.getElementById('analyzing-indicator').style.display='flex';
  document.getElementById('scan-analyze-btn').style.display='none';
  try{
    var res=await fetch(AAPI,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:2000,
        system:'Analyseer het etiket. Antwoord ALLEEN met JSON: {"name":"","producer":"","region":"","year":null,"type":"Rood/Wit/Rose/Mousserende/Dessertwijn/Whisky/Rum/Cognac/Gin/Overig","druivenras":"","smaakprofiel":"","advies":"","serveertemperatuur":"","spijscombinaties":"","geschatte_prijs_min":0,"geschatte_prijs_max":0}',
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:scPhotoB64}},
          {type:'text',text:'Analyseer dit etiket volledig.'}
        ]}]})});
    var data=await res.json();
    document.getElementById('analyzing-indicator').style.display='none';
    document.getElementById('scan-analyze-btn').style.display='block';
    if(data.error){toast('Fout: '+data.error.message);return;}
    var txt=data.content?data.content.map(function(c){return c.text||'';}).join(''):'';
    var w;try{var m=txt.match(/\{[\s\S]*\}/);w=JSON.parse(m?m[0]:txt);}catch(e){toast('Kon etiket niet lezen');return;}
    if(!w.name&&w.producer) w.name=w.producer;
    scannedWine=w;
    document.getElementById('sc-name').textContent=(w.name||'Onbekend')+(w.year?' '+w.year:'');
    document.getElementById('sc-meta').textContent=[w.producer,w.region,w.type].filter(Boolean).join(' · ');
    var info='';
    if(w.geschatte_prijs_min&&w.geschatte_prijs_max)
      info+='<div class="sc-block-row" style="background:rgba(196,146,42,.1)"><div class="sc-label" style="color:var(--gold)">Geschatte prijs</div><div class="sc-val" style="color:var(--gold);font-weight:700">€'+w.geschatte_prijs_min+' – €'+w.geschatte_prijs_max+'</div></div>';
    if(w.druivenras) info+='<div class="sc-block"><div class="sc-label">Druivenras / Graan</div><div class="sc-val">'+w.druivenras+'</div></div>';
    if(w.smaakprofiel) info+='<div class="sc-block"><div class="sc-label">Smaakprofiel</div><div class="sc-val">'+w.smaakprofiel+'</div></div>';
    if(w.serveertemperatuur) info+='<div class="sc-block-row"><div class="sc-label">Serveer</div><div class="sc-val">'+w.serveertemperatuur+'</div></div>';
    if(w.spijscombinaties) info+='<div class="sc-block-row"><div class="sc-label">Past bij</div><div class="sc-val">'+w.spijscombinaties+'</div></div>';
    if(w.advies) info+='<div class="sc-block" style="background:rgba(196,146,42,.06)"><div class="sc-label">Advies</div><div class="sc-val">'+w.advies+'</div></div>';
    document.getElementById('sc-info').innerHTML=info||'<div class="sc-block"><div class="sc-val" style="opacity:.4">Geen info beschikbaar.</div></div>';
    document.getElementById('sc-result').style.display='block';
  }catch(e){
    document.getElementById('analyzing-indicator').style.display='none';
    document.getElementById('scan-analyze-btn').style.display='block';
    toast('Fout: '+e.message);
  }
}

function logTasting(){
  if(!scannedWine) return;
  var name=scannedWine.name||'Onbekend';
  var note=prompt('Proefnotitie voor '+name+':');
  var date=new Date().toLocaleDateString('nl-NL');
  var tastings=JSON.parse(localStorage.getItem('sectio_tastings')||'[]');
  tastings.unshift({date:date,name:name,note:note,type:scannedWine.type,region:scannedWine.region});
  localStorage.setItem('sectio_tastings',JSON.stringify(tastings.slice(0,100)));
  toast('Proeverij genoteerd');
}

function addScannedToKelder(){
  if(!scannedWine) return;
  var aiParts=[];
  if(scannedWine.druivenras) aiParts.push(scannedWine.druivenras+'.');
  if(scannedWine.smaakprofiel) aiParts.push(scannedWine.smaakprofiel);
  if(scannedWine.serveertemperatuur) aiParts.push('Serveer op '+scannedWine.serveertemperatuur+'.');
  if(scannedWine.spijscombinaties) aiParts.push('Past bij: '+scannedWine.spijscombinaties+'.');
  if(scannedWine.advies) aiParts.push(scannedWine.advies);
  scannedAiInfo=aiParts.length?aiParts.join(' '):null;
  var estPrice=null;
  if(scannedWine.geschatte_prijs_min&&scannedWine.geschatte_prijs_max){
    estPrice=((scannedWine.geschatte_prijs_min+scannedWine.geschatte_prijs_max)/2).toFixed(2);
  }
  if(scPhotoB64) scannedPhotoForSave='data:image/jpeg;base64,'+scPhotoB64;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===0);});
  ['kelder','reviews','scanner'].forEach(function(t,i){
    document.getElementById('tab-'+t).style.display=i===0?'block':'none';
  });
  openModal();
  document.getElementById('f-name').value=scannedWine.name||'';
  document.getElementById('f-producer').value=scannedWine.producer||'';
  document.getElementById('f-region').value=scannedWine.region||'';
  document.getElementById('f-year').value=scannedWine.year||'';
  if(scannedWine.type) document.getElementById('f-type').value=scannedWine.type;
  if(estPrice) document.getElementById('f-price').value=estPrice;
}

async function claudeText(prompt,maxTok){
  try{
    var res=await fetch(AAPI,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY},
      body:JSON.stringify({model:'gemini-2.5-flash',max_tokens:maxTok||500,
        system:'Je bent een drank expert. Geef praktische info in het Nederlands. Geen bullet points, gewoon lopende tekst.',
        messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    return data.content?data.content.map(function(c){return c.text||'';}).join(''):null;
  }catch(e){return null;}
}

function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function initScrollHeader(){
  var hero=document.querySelector('.hero');
  var main=document.querySelector('main');
  if(!main||!hero) return;
  var ticking=false;
  main.addEventListener('scroll',function(){
    if(!ticking){
      requestAnimationFrame(function(){
        var progress=Math.min(1,main.scrollTop/676);
        hero.style.maxHeight=Math.max(0,300*(1-progress))+'px';
        hero.style.opacity=Math.max(0,1-progress*1.5);
        hero.style.paddingBottom=(20*(1-progress))+'px';
        ticking=false;
      });
      ticking=true;
    }
  });
}

init();

</script>
</body>
</html>
