<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MijnKelder">
<title>MijnKelder</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--wine:#7B2D3E;--wine-dark:#5a1f2c;--wine-light:#f9f0f2;--wine-mid:#c4849a;--bg:#faf8f5;--card:#ffffff;--text:#1a1410;--muted:#6b5c52;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.18);--r:12px;--rs:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#12100e;--card:#1e1a17;--text:#f0ebe5;--muted:#9a8a7e;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);--wine-light:#2a1520;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
body{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh;}
header{background:var(--card);border-bottom:1px solid var(--border);padding:.75rem 1rem 0;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:.75rem;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:var(--wine);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;}
.logo-name{font-family:'Lora',serif;font-size:17px;font-weight:600;}
.add-fab{background:var(--wine);color:white;border:none;border-radius:var(--rs);padding:7px 13px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.tabs{display:flex;}
.tab{flex:1;padding:9px 0;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;font-family:inherit;}
.tab.active{color:var(--wine);border-bottom-color:var(--wine);}
main{flex:1;overflow-y:auto;padding:1rem;padding-bottom:2rem;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center;}
.stat-num{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--wine);}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.search-row{display:flex;gap:8px;margin-bottom:1rem;}
.sw{flex:1;position:relative;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:2;}
.sw input{width:100%;height:38px;padding:0 12px 0 32px;border:1px solid var(--border2);border-radius:var(--rs);font-size:13px;background:var(--card);color:var(--text);font-family:inherit;}
select.filter{height:38px;padding:0 8px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12px;background:var(--card);color:var(--text);font-family:inherit;}
.wine-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;cursor:pointer;margin-bottom:8px;}
.wc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.wc-name{font-size:14px;font-weight:500;line-height:1.3;}
.wc-year{color:var(--muted);font-weight:400;}
.wc-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.wc-right{text-align:right;flex-shrink:0;}
.wc-score{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--wine);}
.wc-stars{font-size:10px;color:var(--wine-mid);}
.wc-bottles{font-size:11px;color:var(--muted);}
.wc-tags{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.tag{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;}
.tag-rood{background:#fdf0f2;color:#7B2D3E;}.tag-wit{background:#fafaf0;color:#5a5a10;}
.tag-rose{background:#fff0f5;color:#8b3a5a;}.tag-mousserende{background:#f0f5ff;color:#2a4a8b;}
.tag-dessertwijn{background:#fff8e0;color:#7a5500;}.tag-n{background:var(--wine-light);color:var(--muted);}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty svg{width:40px;height:40px;margin:0 auto 12px;display:block;opacity:.35;}
#detail-view{display:none;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:1.25rem;font-family:inherit;}
.back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.detail-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.detail-name{font-family:'Lora',serif;font-size:20px;font-weight:600;line-height:1.3;}
.detail-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.detail-score-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.detail-score-big{font-family:'Lora',serif;font-size:40px;font-weight:600;color:var(--wine);line-height:1;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ditem{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;}
.di-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.di-v{font-size:14px;font-weight:500;margin-top:3px;}
.dsec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.ds-t{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.ds-txt{font-size:13px;color:var(--muted);line-height:1.7;}
.action-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
.btn-a{height:40px;border:1px solid var(--border2);background:var(--card);color:var(--text);border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-a.p{background:var(--wine);color:white;border-color:var(--wine);}
.btn-ai-inline{width:100%;height:38px;border:1px dashed var(--border2);background:none;color:var(--muted);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:inherit;}
.ai-box{font-size:13px;color:var(--muted);line-height:1.7;}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;}
.rv-name{font-size:14px;font-weight:500;}.rv-meta{font-size:11px;color:var(--muted);}
.rv-stars{color:var(--wine);font-size:14px;margin:6px 0;}.rv-text{font-size:13px;color:var(--muted);line-height:1.6;}
.scanner-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:1rem;text-align:center;}
.scanner-hero h2{font-family:'Lora',serif;font-size:17px;font-weight:600;margin-bottom:6px;}
.scanner-hero p{font-size:13px;color:var(--muted);line-height:1.5;}
.scan-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.scan-big-btn{height:50px;border:1px solid var(--border2);background:var(--card);color:var(--text);border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.scan-preview-wrap{display:none;margin-bottom:1rem;}
.scan-preview-wrap img{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;}
.scan-result{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:1rem;display:none;}
.scan-result h3{font-family:'Lora',serif;font-size:16px;font-weight:600;margin-bottom:4px;}
.scan-result-meta{font-size:12px;color:var(--muted);margin-bottom:12px;}
.scan-result-info{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px;}
.scan-add-btn{width:100%;height:44px;background:var(--wine);color:white;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:var(--card);max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}
.modal-header{padding:1rem 1rem .75rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:10;}
.modal-title{font-family:'Lora',serif;font-size:17px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:24px;line-height:1;padding:0 4px;}
.modal-body{padding:1rem;flex:1;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block;}
.fi{width:100%;height:42px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;}
.fi::placeholder{color:var(--muted);}
.fsel{width:100%;height:42px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;}
.fta{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;min-height:80px;line-height:1.5;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.star-row{display:flex;gap:6px;margin-top:5px;}
.star-btn{background:none;border:none;cursor:pointer;font-size:26px;color:#ccc;padding:2px;line-height:1;}
.star-btn.lit{color:var(--wine);}
.btn-scan{height:42px;border:1px solid var(--border2);background:var(--bg);color:var(--text);border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;width:100%;}
.btn-ai{width:100%;height:38px;border:1px dashed var(--border2);background:none;color:var(--muted);border-radius:var(--rs);font-size:12px;cursor:pointer;font-family:inherit;margin-top:6px;}
.ai-prev{background:var(--wine-light);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px;display:none;}
.ai-prev.show{display:block;}
.ppw{display:none;margin-bottom:8px;}
.ppw img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--border);}
.modal-footer{padding:1rem;border-top:1px solid var(--border);display:flex;gap:8px;position:sticky;bottom:0;background:var(--card);}
.btn-save{flex:1;height:44px;background:var(--wine);color:white;border:none;border-radius:var(--rs);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-cancel{height:44px;padding:0 16px;border:1px solid var(--border2);background:none;color:var(--text);border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;}
.btn-delete{height:44px;padding:0 14px;border:1px solid #e24b4a;background:none;color:#e24b4a;border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:inherit;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;}
.sync-dot.err{background:#ef4444;}.sync-dot.spin{background:#f59e0b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-lbl{font-size:11px;color:var(--muted);display:flex;align-items:center;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1410;color:white;padding:10px 18px;border-radius:20px;font-size:13px;z-index:999;transition:transform .25s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading-txt{color:var(--muted);font-size:13px;font-style:italic;}
.version{font-size:10px;color:var(--muted);opacity:0.6;letter-spacing:.3px;}
</style>
</head>
<body>
<div id="app" style="display:none;flex-direction:column;min-height:100dvh">
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M7 2h10l2 7H5L7 2zm5 7v13M9 22h6"/></svg></div>
        <span class="logo-name">MijnKelder</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="version">v0.12</span><span class="sync-lbl"><span class="sync-dot" id="sdot"></span><span id="slbl">laden...</span></span>
        <button class="add-fab" onclick="openModal()">+ Toevoegen</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('kelder',this)">🍷 Kelder</button>
      <button class="tab" onclick="switchTab('reviews',this)">⭐ Reviews</button>
      <button class="tab" onclick="switchTab('scanner',this)">📷 Scanner</button>
    </div>
  </header>
  <main>
    <div id="tab-kelder">
      <div id="main-view">
        <div class="stats" id="stats"></div>
        <div class="search-row">
          <div class="sw">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="search-input" placeholder="Zoek wijn, producent, regio..." oninput="renderList()">
          </div>
          <select class="filter" id="type-filter" onchange="renderList()">
            <option value="">Alle</option><option>Rood</option><option>Wit</option>
            <option>Rosé</option><option>Mousserende</option><option>Dessertwijn</option>
          </select>
        </div>
        <div id="wine-list"></div>
      </div>
      <div id="detail-view">
        <button class="back-btn" onclick="closeDetail()">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Terug naar kelder
        </button>
        <div id="detail-content"></div>
      </div>
    </div>
    <div id="tab-reviews" style="display:none"><div id="reviews-list"></div></div>
    <div id="tab-scanner" style="display:none">
      <div class="scanner-hero">
        <h2>📷 Winkelscanner</h2>
        <p>Foto een wijnetiket in de winkel en krijg direct info — druiven, regio, smaak en of het een goede koop is.</p>
      </div>
      <div class="scan-btns">
        <button class="scan-big-btn" onclick="document.getElementById('sc-cam').click()">📷 Camera</button>
        <button class="scan-big-btn" onclick="document.getElementById('sc-gal').click()">🖼 Galerij</button>
      </div>
      <input type="file" id="sc-cam" accept="image/jpeg,image/png,image/webp" capture="environment" style="display:none" onchange="handleScanPhoto(this)">
      <input type="file" id="sc-gal" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleScanPhoto(this)">
      <div class="scan-preview-wrap" id="sc-preview-wrap">
        <img id="sc-preview-img" alt="preview">
        <button class="btn-ai" style="width:100%;height:44px" onclick="doWinkelScan()">✨ AI: analyseer deze wijn</button>
      </div>
      <div class="scan-result" id="sc-result">
        <h3 id="sc-name"></h3>
        <div class="scan-result-meta" id="sc-meta"></div>
        <div class="scan-result-info" id="sc-info"></div>
        <button class="scan-add-btn" onclick="addScannedToKelder()">+ Voeg toe aan mijn kelder</button>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Wijn toevoegen</span>
      <button class="modal-close" onclick="closeModal()">x</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Scan wijnetiket</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <button class="btn-scan" onclick="document.getElementById('inp-cam').click()">Camera</button>
          <button class="btn-scan" onclick="document.getElementById('inp-gal').click()">Galerij</button>
        </div>
        <input type="file" id="inp-cam" accept="image/jpeg,image/png,image/webp" capture="environment" style="display:none" onchange="handlePhoto(this)">
        <input type="file" id="inp-gal" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handlePhoto(this)">
        <div class="ppw" id="ppw">
          <img id="pimg" alt="preview">
          <button class="btn-ai" style="margin-top:6px" onclick="scanLabel()">Herken wijn op foto</button>
        </div>
        <div class="ai-prev" id="scan-prev"></div>
      </div>
      <div class="fg">
        <label class="fl">Naam</label>
        <input class="fi" id="f-name" placeholder="bijv. Ramirez de la Piscina 2019" autocomplete="off">
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Type</label>
          <select class="fsel" id="f-type"><option>Rood</option><option>Wit</option><option>Rose</option><option>Mousserende</option><option>Dessertwijn</option></select></div>
        <div class="fg"><label class="fl">Jaar</label><input class="fi" id="f-year" type="number" placeholder="2020" min="1900" max="2030"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Producent</label><input class="fi" id="f-producer" placeholder="bijv. Antinori"></div>
        <div class="fg"><label class="fl">Regio / Land</label><input class="fi" id="f-region" placeholder="bijv. Rioja, ES"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Flessen</label><input class="fi" id="f-bottles" type="number" value="1" min="0"></div>
        <div class="fg"><label class="fl">Prijs/fles</label><input class="fi" id="f-price" type="number" placeholder="0.00" step="0.01" min="0"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Drink vanaf</label><input class="fi" id="f-dfrom" type="number" placeholder="2024"></div>
        <div class="fg"><label class="fl">Drink voor</label><input class="fi" id="f-dto" type="number" placeholder="2032"></div>
      </div>
      <div class="fg">
        <label class="fl">Beoordeling</label>
        <div class="star-row">
          <button class="star-btn" onclick="setStar(1)">&#9733;</button>
          <button class="star-btn" onclick="setStar(2)">&#9733;</button>
          <button class="star-btn" onclick="setStar(3)">&#9733;</button>
          <button class="star-btn" onclick="setStar(4)">&#9733;</button>
          <button class="star-btn" onclick="setStar(5)">&#9733;</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Proefnotitie</label>
        <textarea class="fta" id="f-notes" placeholder="Hoe smaakte de wijn? Aroma, smaak, afdronk..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btn-del" style="display:none" onclick="deleteWine()">Verwijder</button>
      <button class="btn-cancel" onclick="closeModal()">Annuleer</button>
      <button class="btn-save" onclick="saveWine()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Convert any image (incl HEIC) to JPEG via canvas
function imgToJpeg(file, cb) {
  // iOS auto-converts HEIC to JPEG when accept= specifies jpeg/png/webp
  // So we can just read the file directly with FileReader
  var reader = new FileReader();
  reader.onload = function(e) {
    var d = e.target.result;
    if (!d || d.indexOf(',') === -1) { cb(null, null, 'Foto kon niet worden gelezen.'); return; }
    cb(d.split(',')[1], d);
  };
  reader.onerror = function() { cb(null, null, 'Foto laden mislukt. Probeer een andere foto.'); };
  reader.readAsDataURL(file);
}

    cb(c.toDataURL('image/jpeg', 0.7).split(',')[1]);
  };
  img.onerror = function() { cb(b64); }; // fallback to original
  img.src = 'data:image/jpeg;base64,' + b64;
}

async function init() {
  sb = supabase.createClient(SB_URL, SB_KEY);
  document.getElementById('app').style.display = 'flex';
  setSS('spin', 'laden...');
  await loadWines();
  setSS('ok', 'verbonden');
}

function setSS(cls, txt) {
  document.getElementById('sdot').className = cls === 'ok' ? 'sync-dot' : ('sync-dot ' + cls);
  document.getElementById('slbl').textContent = txt;
}

async function loadWines() {
  var r = await sb.from('wines').select('*').order('created_at', { ascending: false });
  if (r.error) { setSS('err', 'fout'); return; }
  wines = r.data || [];
  renderAll();
}

async function saveToDB(w) {
  setSS('spin', 'opslaan...');
  var row = { name: w.name, type: w.type, year: w.year || null, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price || null,
    drink_from: w.drinkFrom || null, drink_to: w.drinkTo || null,
    rating: w.rating || null, notes: w.notes, ai_info: w.aiInfo || null };
  var r = w.id ? await sb.from('wines').update(row).eq('id', w.id) : await sb.from('wines').insert(row);
  if (r.error) { setSS('err', 'fout'); toast('Opslaan mislukt'); return false; }
  setSS('ok', 'verbonden'); await loadWines(); return true;
}

async function delFromDB(id) {
  await sb.from('wines').delete().eq('id', id);
  await loadWines();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  ['kelder', 'reviews', 'scanner'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'reviews') renderReviews();
}

function renderAll() { renderStats(); renderList(); }

function renderStats() {
  var total = wines.reduce(function(s, w) { return s + (w.bottles || 0); }, 0);
  var rated = wines.filter(function(w) { return w.rating; });
  var avg = rated.length ? (rated.reduce(function(s, w) { return s + w.rating; }, 0) / rated.length).toFixed(1) : '--';
  var val = wines.reduce(function(s, w) { return s + (w.price || 0) * (w.bottles || 0); }, 0);
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">Flessen</div></div>' +
    '<div class="stat"><div class="stat-num">' + avg + '</div><div class="stat-label">Gem. score</div></div>' +
    '<div class="stat"><div class="stat-num">&#8364;' + Math.round(val) + '</div><div class="stat-label">Waarde</div></div>';
}

function renderList() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  var tf = document.getElementById('type-filter').value;
  var list = wines.filter(function(w) {
    return [w.name, w.producer, w.region, w.year].join(' ').toLowerCase().indexOf(q) >= 0 && (!tf || w.type === tf);
  });
  var el = document.getElementById('wine-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" stroke-width="1.5" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M7 2h10l2 7H5L7 2zm5 7v13M9 22h6"/></svg><p>' + (wines.length ? 'Geen resultaten.' : 'Kelder is leeg. Voeg je eerste wijn toe!') + '</p></div>';
    return;
  }
  el.innerHTML = list.map(function(w) {
    var tk = (w.type || 'rood').toLowerCase().replace(/\s/g, '');
    var stars = w.rating ? '&#9733;'.repeat(w.rating) : '';
    return '<div class="wine-card" onclick="showDetail(\'' + w.id + '\')">' +
      '<div class="wc-top"><div style="min-width:0"><div class="wc-name">' + (w.name || '') + (w.year ? ' <span class="wc-year">' + w.year + '</span>' : '') + '</div>' +
      '<div class="wc-meta">' + ([w.producer, w.region].filter(Boolean).join(' &middot; ') || '--') + '</div></div>' +
      '<div class="wc-right">' + (w.rating ? '<div class="wc-score">' + w.rating + '/5</div><div class="wc-stars">' + stars + '</div>' : '<div class="wc-bottles">' + (w.bottles || 0) + ' fles' + ((w.bottles || 0) !== 1 ? 'sen' : '') + '</div>') + '</div></div>' +
      '<div class="wc-tags"><span class="tag tag-' + tk + '">' + (w.type || 'Rood') + '</span>' +
      '<span class="tag tag-n">' + (w.bottles || 0) + ' fles' + ((w.bottles || 0) !== 1 ? 'sen' : '') + '</span>' +
      (w.drink_from ? '<span class="tag tag-n">' + w.drink_from + '--' + (w.drink_to || '?') + '</span>' : '') +
      '</div></div>';
  }).join('');
}

function showDetail(id) {
  detailId = id;
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  var s5 = w.rating || 0;
  var sh = '&#9733;'.repeat(s5) + '&#9734;'.repeat(5 - s5);
  var tk = (w.type || 'rood').toLowerCase().replace(/\s/g, '');
  document.getElementById('detail-content').innerHTML =
    '<div class="detail-hero">' +
    '<div class="detail-name">' + (w.name || '') + (w.year ? ' <span style="font-weight:400;color:var(--muted)">' + w.year + '</span>' : '') + '</div>' +
    '<div class="detail-sub">' + ([w.producer, w.region].filter(Boolean).join(' &middot; ')) + '</div>' +
    '<div class="detail-score-row"><div><div class="detail-score-big">' + (w.rating || '--') + '</div><div style="color:var(--wine-mid);font-size:18px">' + sh + '</div></div>' +
    '<span class="tag tag-' + tk + '">' + (w.type || 'Rood') + '</span></div></div>' +
    '<div class="dgrid">' +
    '<div class="ditem"><div class="di-l">In kelder</div><div class="di-v">' + (w.bottles || 0) + ' fles' + ((w.bottles || 0) !== 1 ? 'sen' : '') + '</div></div>' +
    '<div class="ditem"><div class="di-l">Waarde</div><div class="di-v">' + (w.price ? '&#8364;' + ((w.price || 0) * (w.bottles || 0)).toFixed(2) : '--') + '</div></div>' +
    (w.drink_from ? '<div class="ditem"><div class="di-l">Drinkvenster</div><div class="di-v">' + w.drink_from + '--' + (w.drink_to || '?') + '</div></div>' : '') +
    '<div class="ditem"><div class="di-l">Prijs/fles</div><div class="di-v">' + (w.price ? '&#8364;' + Number(w.price).toFixed(2) : '--') + '</div></div>' +
    '</div>' +
    (w.notes ? '<div class="dsec"><div class="ds-t">Proefnotitie</div><div class="ds-txt">' + w.notes + '</div></div>' : '') +
    '<div class="dsec"><div class="ds-t">Wijninfo</div><div id="ai-det">' +
    (w.ai_info ? '<div class="ai-box">' + w.ai_info + '</div>' : '<button class="btn-ai-inline" onclick="loadAIDetail(\'' + id + '\')">Haal wijninfo op</button>') +
    '</div></div>' +
    '<div class="action-row">' +
    '<button class="btn-a p" onclick="openModal(\'' + id + '\')">Bewerk</button>' +
    '<button class="btn-a" onclick="drinkFles(\'' + id + '\')">Drinken</button>' +
    '<button class="btn-a" onclick="addFles(\'' + id + '\')">+ Fles</button>' +
    '</div>';
  document.getElementById('main-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
}

function closeDetail() {
  detailId = null;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
}

async function drinkFles(id) {
  var w = wines.find(function(x) { return x.id === id; });
  if (!w || w.bottles <= 0) { toast('Geen flessen meer'); return; }
  var note = prompt('Proefnotitie (optioneel):');
  w.bottles = (w.bottles || 0) - 1;
  if (note) w.notes = (w.notes ? w.notes + '\n\n' : '') + '[' + new Date().toLocaleDateString('nl-NL') + '] ' + note;
  await saveToDB({ id: id, name: w.name, type: w.type, year: w.year, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price, drinkFrom: w.drink_from,
    drinkTo: w.drink_to, rating: w.rating, notes: w.notes, aiInfo: w.ai_info });
  showDetail(id);
}

async function addFles(id) {
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  w.bottles = (w.bottles || 0) + 1;
  await saveToDB({ id: id, name: w.name, type: w.type, year: w.year, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price, drinkFrom: w.drink_from,
    drinkTo: w.drink_to, rating: w.rating, notes: w.notes, aiInfo: w.ai_info });
  showDetail(id);
}

async function loadAIDetail(id) {
  var w = wines.find(function(x) { return x.id === id; });
  var box = document.getElementById('ai-det');
  box.innerHTML = '<span class="loading-txt">Info ophalen...</span>';
  var info = await claudeText('Vertel in het Nederlands over: ' + (w.name || '') + ' ' + (w.year || '') + ' van ' + (w.producer || '') + ', ' + (w.region || '') + ', type: ' + (w.type || '') + '. Behandel: druivenrassen, terroir, smaakprofiel, spijscombinaties, serveertemperatuur. Bondig en praktisch.');
  box.innerHTML = info ? '<div class="ai-box">' + info + '</div>' : '<span class="loading-txt">Niet beschikbaar.</span>';
  if (info) { await sb.from('wines').update({ ai_info: info }).eq('id', id); }
}

function renderReviews() {
  var rated = wines.filter(function(w) { return w.rating && w.notes; }).sort(function(a, b) { return b.rating - a.rating; });
  var el = document.getElementById('reviews-list');
  if (!rated.length) {
    el.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><p>Nog geen reviews.</p></div>';
    return;
  }
  el.innerHTML = rated.map(function(w) {
    return '<div class="review-card" onclick="goToDetail(\'' + w.id + '\')">' +
      '<div style="display:flex;justify-content:space-between"><div class="rv-name">' + (w.name || '') + (w.year ? ' ' + w.year : '') + '</div>' +
      '<div class="rv-meta">' + new Date(w.created_at).toLocaleDateString('nl-NL') + '</div></div>' +
      '<div class="rv-meta">' + (w.producer || '') + '</div>' +
      '<div class="rv-stars">' + '&#9733;'.repeat(w.rating) + '&#9734;'.repeat(5 - w.rating) + ' ' + w.rating + '/5</div>' +
      '<div class="rv-text">' + w.notes + '</div></div>';
  }).join('');
}

function goToDetail(id) {
  document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', i === 0); });
  ['kelder', 'reviews', 'scanner'].forEach(function(t, i) {
    document.getElementById('tab-' + t).style.display = i === 0 ? 'block' : 'none';
  });
  showDetail(id);
}

function openModal(id) {
  editId = id || null; starRating = 0;
  document.getElementById('modal-title').textContent = id ? 'Wijn bewerken' : 'Wijn toevoegen';
  document.getElementById('btn-del').style.display = id ? 'block' : 'none';
  document.getElementById('scan-prev').className = 'ai-prev';
  photoB64 = null;
  document.getElementById('ppw').style.display = 'none';
  document.getElementById('inp-cam').value = '';
  document.getElementById('inp-gal').value = '';
  if (id) {
    var w = wines.find(function(x) { return x.id === id; });
    document.getElementById('f-name').value = w.name || '';
    document.getElementById('f-type').value = w.type || 'Rood';
    document.getElementById('f-year').value = w.year || '';
    document.getElementById('f-producer').value = w.producer || '';
    document.getElementById('f-region').value = w.region || '';
    document.getElementById('f-bottles').value = w.bottles || 1;
    document.getElementById('f-price').value = w.price || '';
    document.getElementById('f-dfrom').value = w.drink_from || '';
    document.getElementById('f-dto').value = w.drink_to || '';
    document.getElementById('f-notes').value = w.notes || '';
    starRating = w.rating || 0;
  } else {
    ['f-name', 'f-year', 'f-producer', 'f-region', 'f-price', 'f-dfrom', 'f-dto', 'f-notes'].forEach(function(i) { document.getElementById(i).value = ''; });
    document.getElementById('f-type').value = 'Rood';
    document.getElementById('f-bottles').value = 1;
  }
  updateStars();
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function setStar(n) { starRating = n; updateStars(); }
function updateStars() { document.querySelectorAll('.star-btn').forEach(function(b, i) { b.classList.toggle('lit', i < starRating); }); }

function handlePhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var el = document.getElementById('scan-prev');
  el.className = 'ai-prev';
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    if (!dataUrl || dataUrl.indexOf(',') === -1) {
      el.textContent = 'Fout: dataUrl leeg of ongeldig';
      return;
    }
    photoB64 = dataUrl.split(',')[1];
    document.getElementById('pimg').src = dataUrl;
    document.getElementById('ppw').style.display = 'block';
    el.className = 'ai-prev';
  };
  reader.onerror = function(e) {
    el.className = 'ai-prev show';
    el.textContent = 'FileReader fout: ' + (e.target.error ? e.target.error.message : 'onbekend');
  };
  reader.readAsDataURL(file);
}

async function scanLabel() {
  if (!photoB64) return;
  var el = document.getElementById('scan-prev');
  el.className = 'ai-prev show'; el.textContent = 'Afbeelding verkleinen...';
  compressImage(photoB64, async function(smallB64) {
  el.textContent = 'Etiket herkennen...';
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_PUB_KEY, 'apikey': SB_PUB_KEY },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 600,
        system: 'Analyseer het wijnetiket en geef JSON terug met: name, producer, region, year (getal of null), type (kies uit: Rood, Wit, Rose, Mousserende, Dessertwijn). Antwoord ALLEEN met geldige JSON zonder markdown.',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: smallB64 } },
          { type: 'text', text: 'Wat staat er op dit wijnetiket? Geef JSON.' }
        ]}]})});
    var data = await res.json();
    if (data.error) { el.textContent = 'Fout: ' + data.error.message; return; }
    var txt = data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : '';
    var w;
    try { w = JSON.parse(txt.replace(/```json|```/g, '').trim()); }
    catch(e) { el.textContent = txt || 'Kon etiket niet lezen.'; return; }
    if (w.name) document.getElementById('f-name').value = w.name;
    if (w.producer) document.getElementById('f-producer').value = w.producer;
    if (w.region) document.getElementById('f-region').value = w.region;
    if (w.year) document.getElementById('f-year').value = w.year;
    if (w.type) document.getElementById('f-type').value = w.type;
    el.textContent = 'Gevonden: ' + [w.name, w.producer, w.region, w.year].filter(Boolean).join(', ');
    toast('Etiket herkend');
  } catch(e) { el.textContent = 'Fout: ' + e.message; }
  }); // end compressImage
}

async function saveWine() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Naam is verplicht.'); return; }
  var btn = document.querySelector('.btn-save');
  btn.textContent = 'Opslaan...'; btn.disabled = true;

  // Generate AI info automatically for new wines or when editing without existing info
  var existingAI = editId ? ((wines.find(function(w) { return w.id === editId; }) || {}).ai_info || null) : null;
  var aiInfo = existingAI;
  if (!aiInfo) {
    var producer = document.getElementById('f-producer').value;
    var region = document.getElementById('f-region').value;
    var year = document.getElementById('f-year').value;
    var type = document.getElementById('f-type').value;
    aiInfo = await claudeText('Vertel in het Nederlands over wijn: "' + name + '"' + (year ? ' ' + year : '') + (producer ? ' van ' + producer : '') + (region ? ', ' + region : '') + ', type: ' + type + '. Behandel: druivenrassen, smaakprofiel, spijscombinaties, serveertemperatuur. Bondig en praktisch, max 120 woorden.');
  }

  var ok = await saveToDB({ id: editId || null, name: name,
    type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || null,
    producer: document.getElementById('f-producer').value,
    region: document.getElementById('f-region').value,
    bottles: parseInt(document.getElementById('f-bottles').value) || 1,
    price: parseFloat(document.getElementById('f-price').value) || null,
    drinkFrom: parseInt(document.getElementById('f-dfrom').value) || null,
    drinkTo: parseInt(document.getElementById('f-dto').value) || null,
    rating: starRating || null,
    notes: document.getElementById('f-notes').value,
    aiInfo: aiInfo });

  btn.textContent = 'Opslaan'; btn.disabled = false;
  if (ok) { closeModal(); toast('Opgeslagen'); if (detailId) showDetail(detailId); }
}

async function deleteWine() {
  if (!confirm('Wijn verwijderen?')) return;
  await delFromDB(editId);
  closeModal(); closeDetail(); toast('Verwijderd');
}

// WINKEL SCANNER
function handleScanPhoto(input) {
  var file = input.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    if (!dataUrl || dataUrl.indexOf(',') === -1) {
      toast('Fout: dataUrl leeg');
      return;
    }
    scPhotoB64 = dataUrl.split(',')[1];
    document.getElementById('sc-preview-img').src = dataUrl;
    document.getElementById('sc-preview-wrap').style.display = 'block';
    document.getElementById('sc-result').style.display = 'none';
  };
  reader.onerror = function(e) {
    toast('Fout: ' + (e.target.error ? e.target.error.message : 'onbekend'));
  };
  reader.readAsDataURL(file);
}

async function doWinkelScan() {
  if (!scPhotoB64) return;
  var btn = document.querySelector('#sc-preview-wrap .btn-ai');
  btn.textContent = 'Analyseren...';
  compressImage(scPhotoB64, async function(smallB64) {
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_PUB_KEY, 'apikey': SB_PUB_KEY },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 800,
        system: 'Analyseer het wijnetiket. Geef JSON met: name, producer, region, year (getal of null), type (Rood/Wit/Rose/Mousserende/Dessertwijn), druivenras, smaakprofiel (2-3 zinnen), advies (is dit een goede koop en wat maakt het bijzonder?), serveertemperatuur, spijscombinaties. ALLEEN geldige JSON.',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: smallB64 } },
          { type: 'text', text: 'Analyseer dit wijnetiket volledig.' }
        ]}]})});
    var data = await res.json();
    if (data.error) { toast('Fout: ' + data.error.message); btn.textContent = 'AI: analyseer deze wijn'; return; }
    var txt = data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : '';
    var w;
    try { w = JSON.parse(txt.replace(/```json|```/g, '').trim()); }
    catch(e) { toast('Kon etiket niet lezen'); btn.textContent = 'AI: analyseer deze wijn'; return; }
    scannedWine = w;
    document.getElementById('sc-name').textContent = (w.name || 'Onbekend') + (w.year ? ' ' + w.year : '');
    document.getElementById('sc-meta').textContent = [w.producer, w.region, w.druivenras].filter(Boolean).join(' - ');
    document.getElementById('sc-info').innerHTML =
      (w.smaakprofiel ? '<b>Smaak:</b> ' + w.smaakprofiel + '<br><br>' : '') +
      (w.advies ? '<b>Advies:</b> ' + w.advies + '<br><br>' : '') +
      (w.serveertemperatuur ? '<b>Serveer:</b> ' + w.serveertemperatuur + '<br>' : '') +
      (w.spijscombinaties ? '<b>Past bij:</b> ' + w.spijscombinaties : '');
    document.getElementById('sc-result').style.display = 'block';
    btn.textContent = 'AI: analyseer deze wijn';
  } catch(e) { toast('Fout: ' + e.message); btn.textContent = 'AI: analyseer deze wijn'; }
  }); // end compressImage
}

function addScannedToKelder() {
  if (!scannedWine) return;
  openModal();
  setTimeout(function() {
    if (scannedWine.name) document.getElementById('f-name').value = scannedWine.name;
    if (scannedWine.producer) document.getElementById('f-producer').value = scannedWine.producer;
    if (scannedWine.region) document.getElementById('f-region').value = scannedWine.region;
    if (scannedWine.year) document.getElementById('f-year').value = scannedWine.year;
    if (scannedWine.type) document.getElementById('f-type').value = scannedWine.type;
  }, 100);
}

async function claudeText(prompt) {
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_PUB_KEY, 'apikey': SB_PUB_KEY },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 500,
        system: 'Je bent een vriendelijke sommelier. Geef praktische wijninfo in het Nederlands. Geen bullet points, gewoon lopende tekst.',
        messages: [{ role: 'user', content: prompt }] }) });
    var data = await res.json();
    return data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : null;
  } catch(e) { return null; }
}

function toast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

init();
</script>
