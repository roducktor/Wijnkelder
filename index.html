<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Sectio">
<title>Sectio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --black:#0A0A0A;
  --black2:#141414;
  --black3:#1C1C1C;
  --black4:#242424;
  --gold:#C4922A;
  --gold-light:#E8B84B;
  --white:#FFFFFF;
  --white2:#E8E4DC;
  --muted:#555555;
  --muted2:#333333;
  --r:20px;--rs:12px;
  /* Card colors */
  --c-rood:#C20114;
  --c-wit:#2D4A6B;
  --c-rose:#7B2D5A;
  --c-mousserende:#1A5C3A;
  --c-dessertwijn:#6B3A1F;
  --c-whisky:#C4922A;
  --c-rum:#3D1F6B;
  --c-cognac:#8B3A1F;
  --c-gin:#1F5A3A;
  --c-overig:#3A3A3A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:'Space Grotesk',sans-serif;}
body{max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100dvh;}

/* ── HEADER ── */
header{background:var(--black);padding:20px 20px 0;position:sticky;top:0;z-index:50;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.wordmark{font-size:20px;font-weight:900;letter-spacing:5px;color:var(--white);}
.header-right{display:flex;align-items:center;gap:10px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.sync-dot.err{background:#C20114;}.sync-dot.spin{animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.version{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.add-pill{background:var(--gold);color:var(--black);border:none;border-radius:30px;padding:9px 20px;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.add-pill:active{background:var(--gold-light);}

/* Hero stats */
.hero{padding:0 0 20px;max-height:300px;opacity:1;overflow:hidden;}
.hero.hidden{max-height:0;padding:0;opacity:0;pointer-events:none;}
.hero-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.hero-number{font-size:54px;font-weight:900;line-height:1;letter-spacing:-2px;}
.hero-number span{font-size:22px;color:var(--muted);font-weight:500;letter-spacing:0;}
.mini-stats{display:flex;gap:8px;margin-top:14px;}
.ms{background:var(--black3);border-radius:var(--rs);padding:12px 14px;flex:1;}
.ms-val{font-size:20px;font-weight:700;color:var(--gold);}
.ms-label{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--black3);}
.tab{flex:1;padding:10px 0;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-bottom:-1px;}
.tab.active{color:var(--white);border-bottom-color:var(--gold);}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;padding-bottom:2rem;background:var(--black);}

/* Search */
.search-row{margin:14px 20px 10px;background:var(--black3);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.search-row input{background:none;border:none;color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;flex:1;}
.search-row input::placeholder{color:var(--muted);}
.search-row svg{flex-shrink:0;}

/* Filter pills */
.filter-pills{display:flex;gap:7px;padding:0 20px 16px;overflow-x:auto;}
.filter-pills::-webkit-scrollbar{display:none;}
.fpill{background:none;color:var(--muted);border:1px solid var(--muted2);border-radius:30px;padding:5px 14px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;font-family:'Space Grotesk',sans-serif;}
.fpill.active{background:var(--white);color:var(--black);border-color:var(--white);}

/* ── CARD STACK ── */
.card-stack{padding:0 16px;display:flex;flex-direction:column;gap:0;}
.card-outer{position:relative;margin-bottom:10px;}
.card-outer:last-child{margin-bottom:0;}

.drink-card{
  border-radius:var(--r);
  padding:16px 18px;
  cursor:pointer;
  position:relative;
  z-index:2;
  transition:opacity .15s;
}
.drink-card:active{opacity:.85;}

.dc-rood{background:var(--c-rood);}
.dc-wit{background:var(--c-wit);}
.dc-rose{background:var(--c-rose);}
.dc-mousserende{background:var(--c-mousserende);}
.dc-dessertwijn{background:var(--c-dessertwijn);}
.dc-whisky{background:var(--c-whisky);}
.dc-rum{background:var(--c-rum);}
.dc-cognac{background:var(--c-cognac);}
.dc-gin{background:var(--c-gin);}
.dc-overig{background:var(--c-overig);}

.dc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.dc-type{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.6);}
.dc-badge{font-size:10px;font-weight:700;background:rgba(0,0,0,.25);border-radius:30px;padding:4px 12px;color:rgba(255,255,255,.8);}
.dc-whisky .dc-type{color:rgba(0,0,0,.55);}
.dc-whisky .dc-badge{color:rgba(0,0,0,.7);}
.dc-whisky .dc-name{color:var(--black);}
.dc-whisky .dc-producer{color:rgba(0,0,0,.45);}
.dc-whisky .dc-region{color:rgba(0,0,0,.4);}
.dc-whisky .dc-score{color:var(--black);}
.dc-whisky .dc-stars{color:rgba(0,0,0,.5);}

.dc-name{font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-.5px;margin-bottom:3px;}
.dc-producer{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:18px;}
.dc-footer{display:flex;justify-content:space-between;align-items:flex-end;}
.dc-region{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);}
.dc-score{font-size:42px;font-weight:900;line-height:1;letter-spacing:-2px;}
.dc-stars{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:2px;text-align:right;margin-top:2px;}
.dc-no-score{font-size:11px;color:rgba(255,255,255,.25);padding-bottom:8px;}
.stack-end{height:30px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:8px;}
.empty-sub{font-size:13px;letter-spacing:.5px;line-height:1.6;}

/* ── DETAIL ── */
#detail-view{display:none;}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:16px 20px;font-family:'Space Grotesk',sans-serif;width:100%;}
.detail-hero{padding:24px 20px;position:relative;}
.detail-category{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:10px;}
.detail-name-big{font-size:32px;font-weight:900;line-height:1.05;letter-spacing:-.5px;margin-bottom:4px;}
.detail-vintage{font-size:20px;font-weight:400;color:rgba(255,255,255,.55);}
.detail-producer{font-size:11px;color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:.5px;}
.detail-score-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);}
.detail-score-huge{font-size:64px;font-weight:900;line-height:1;letter-spacing:-3px;}
.detail-stars-big{font-size:18px;color:var(--gold);letter-spacing:3px;margin-top:4px;}
.detail-right{text-align:right;}
.detail-meta-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:2px;}
.detail-meta-val{font-size:18px;font-weight:700;}

/* Detail data grid */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--black3);border-top:1px solid var(--black3);}
.ditem{background:var(--black2);padding:14px 20px;}
.di-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.di-v{font-size:16px;font-weight:700;}

/* Detail sections */
.dsec{padding:16px 20px;border-top:1px solid var(--black3);background:var(--black2);}
.ds-t{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.ds-txt{font-size:13px;color:var(--muted);line-height:1.7;}

/* Notes per entry */
.note-entry{padding:10px 0;border-bottom:1px solid var(--black3);}
.note-entry:last-child{border-bottom:none;}
.note-date{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.note-text{font-size:13px;color:var(--white2);line-height:1.6;}

/* Action buttons */
.action-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--black3);}
.btn-a{height:50px;background:var(--black2);color:var(--white);border:none;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:background .15s;}
.btn-a:active{background:var(--black3);}
.btn-a.primary{background:var(--gold);color:var(--black);}
.btn-a.primary:active{background:var(--gold-light);}
.btn-del-notes{width:calc(100% - 40px);margin:0 20px 16px;height:40px;background:none;border:1px solid rgba(194,1,20,.4);color:rgba(194,1,20,.7);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.btn-ai-inline{width:calc(100% - 40px);margin:0 20px;height:40px;background:none;border:1px solid var(--black3);color:var(--muted);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}

/* ── LOGBOEK ── */
.log-card{background:var(--black2);margin:0 20px 10px;border-radius:var(--rs);padding:16px;cursor:pointer;}
.lc-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.lc-meta{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.lc-stars{color:var(--gold);font-size:13px;letter-spacing:2px;margin-bottom:6px;}
.lc-text{font-size:13px;color:var(--muted);line-height:1.6;}

/* ── SCANNER ── */
.scanner-hero{padding:24px 20px 20px;border-bottom:1px solid var(--black3);}
.scanner-hero h2{font-size:26px;font-weight:900;margin-bottom:8px;}
.scanner-hero p{font-size:13px;color:var(--muted);line-height:1.5;}
.scan-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 0;}
.scan-big-btn{height:54px;background:var(--black2);color:var(--white);border:none;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-big-btn:active{background:var(--black3);}
.scan-preview-wrap{display:none;padding:16px 20px;border-bottom:1px solid var(--black3);}
.scan-preview-wrap img{width:100%;max-height:240px;object-fit:cover;border-radius:var(--rs);margin-bottom:10px;}
.btn-scan-ai{width:100%;height:50px;background:var(--gold);color:var(--black);border:none;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-result{display:none;}
.scan-result-card{margin:0;border-bottom:1px solid var(--black3);}
.src-name{font-size:24px;font-weight:900;padding:20px 20px 4px;}
.src-meta{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 20px 16px;border-bottom:1px solid var(--black3);}
.sc-block{padding:12px 20px;border-bottom:1px solid var(--black3);}
.sc-block-row{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(--black3);}
.sc-label{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.sc-block-row .sc-label{margin-bottom:0;}
.sc-val{font-size:13px;color:var(--white2);line-height:1.6;}
.sc-block-row .sc-val{font-size:13px;color:var(--white);text-align:right;max-width:55%;}
.scan-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 16px;}
.scan-action-btn{height:50px;background:var(--black2);color:var(--white);border:none;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--r);}
.scan-action-btn.primary{background:var(--gold);color:var(--black);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:var(--black2);max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--black3);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--black2);z-index:10;}
.modal-title{font-size:18px;font-weight:900;letter-spacing:-.3px;}
.modal-close{background:var(--black3);border:none;color:var(--white);cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;}
.modal-body{padding:20px;flex:1;}
.fg{margin-bottom:20px;}
.fl{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:block;}
.fi{width:100%;height:46px;padding:0 16px;border:none;border-bottom:1px solid var(--black3);background:var(--black3);border-radius:var(--rs);font-size:15px;color:var(--white);font-family:'Space Grotesk',sans-serif;outline:none;}
.fi::placeholder{color:var(--muted);}
.fsel{width:100%;height:46px;padding:0 16px;border:none;background:var(--black3);border-radius:var(--rs);font-size:14px;color:var(--white);font-family:'Space Grotesk',sans-serif;outline:none;}
.fsel option,.fsel optgroup{background:var(--black2);}
.fta{width:100%;padding:14px 16px;border:none;background:var(--black3);border-radius:var(--rs);font-size:14px;color:var(--white);font-family:'Space Grotesk',sans-serif;resize:none;min-height:90px;line-height:1.5;outline:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.star-row{display:flex;gap:8px;margin-top:4px;}
.star-btn{background:none;border:none;cursor:pointer;font-size:28px;color:var(--black3);padding:2px;line-height:1;}
.star-btn.lit{color:var(--gold);}
.btn-scan-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.btn-scan{height:46px;border:1px solid var(--black3);background:var(--black3);color:var(--white);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.btn-ai-fetch{width:100%;height:42px;background:none;border:1px solid var(--black3);color:var(--muted);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);margin-top:8px;}
.ai-prev{background:rgba(196,146,42,.08);border:1px solid rgba(196,146,42,.2);border-radius:var(--rs);padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px;display:none;}
.ai-prev.show{display:block;}
.ppw{display:none;margin-bottom:10px;}
.ppw img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);}
.modal-footer{padding:16px 20px;border-top:1px solid var(--black3);display:flex;gap:8px;position:sticky;bottom:0;background:var(--black2);}
.btn-save{flex:1;height:50px;background:var(--gold);color:var(--black);border:none;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.btn-cancel{height:50px;padding:0 16px;background:var(--black3);color:var(--muted);border:none;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.btn-delete{height:50px;padding:0 16px;background:none;border:1px solid rgba(194,1,20,.4);color:rgba(194,1,20,.8);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}

/* Drink modal */
.drink-amount-btn{height:42px;border:1px solid var(--black3);background:var(--black3);color:var(--muted);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.drink-amount-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}
.drink-star{background:none;border:none;cursor:pointer;font-size:28px;color:var(--black3);padding:2px;line-height:1;}
.drink-star.lit{color:var(--gold);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black4);color:var(--white);padding:10px 20px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;z-index:999;transition:transform .25s;white-space:nowrap;pointer-events:none;border-radius:30px;border:1px solid var(--black3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading-txt{color:var(--muted);font-size:12px;font-style:italic;}

/* AI box */
.ai-box{font-size:13px;color:var(--muted);line-height:1.7;}

/* ── EXPAND PANEL ── */
.card-expand{overflow:hidden;max-height:0;transition:max-height .45s cubic-bezier(.4,0,.2,1);background:var(--expand-color,var(--black2));margin-top:-2px;position:relative;z-index:1;}
.card-expand.open{max-height:1400px;}
.card-outer.expanded .drink-card{border-radius:var(--r) var(--r) 0 0;}
.card-expand.open{border-radius:0 0 var(--r) var(--r);}
.card-outer{overflow:hidden;border-radius:var(--r);}
.expand-inner{background:var(--expand-color,var(--black2));padding-bottom:4px;}
.expand-close{display:flex;justify-content:flex-end;padding:10px 16px 4px;}
.expand-close button{background:none;border:none;color:rgba(255,255,255,.4);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;}
.exp-section{padding:12px 18px;border-top:1px solid rgba(0,0,0,.2);}
.exp-label{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px;}
.exp-ai-text{font-size:14px;color:rgba(255,255,255,.75);line-height:1.75;word-break:break-word;}
.exp-ai-btn{width:100%;height:38px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:var(--rs);}
.exp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(0,0,0,.15);}
.exp-item{padding:12px 18px;border-right:1px solid rgba(0,0,0,.2);border-bottom:1px solid rgba(0,0,0,.2);}
.exp-item:nth-child(3n){border-right:none;}
.exp-val{font-size:18px;font-weight:700;color:#fff;}
.exp-stars-row{display:flex;align-items:center;justify-content:space-between;}
.exp-stars{font-size:18px;color:rgba(255,255,255,.7);letter-spacing:3px;}
.exp-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid rgba(0,0,0,.15);}
.exp-btn{flex:1;height:44px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.9);border:none;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Space Grotesk',sans-serif;border-radius:30px;}
.exp-btn:active{opacity:.75;}
.exp-btn.primary{background:rgba(255,255,255,.9);color:var(--expand-text,#000);flex:1.4;}

</head>
<body>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;min-height:100dvh">
  <header>
    <div class="header-top">
      <div class="wordmark">SECTIO</div>
      <div class="header-right">
        <span class="version" id="slbl">v0.39</span>
        <span class="sync-dot spin" id="sdot"></span>
        <button class="add-pill" onclick="openModal()">+ Toevoegen</button>
      </div>
    </div>
    <div class="hero">
      <div class="hero-label">Totale collectie</div>
      <div class="hero-number" id="hero-num">0 <span>flessen</span></div>
      <div class="mini-stats" id="mini-stats">
        <div class="ms"><div class="ms-val" id="ms-score">—</div><div class="ms-label">Score</div></div>
        <div class="ms"><div class="ms-val" id="ms-val">€0</div><div class="ms-label">Waarde</div></div>
        <div class="ms"><div class="ms-val" id="ms-logs">0</div><div class="ms-label">Logs</div></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('kelder',this)">Collectie</button>
      <button class="tab" onclick="switchTab('reviews',this)">Logboek</button>
      <button class="tab" onclick="switchTab('scanner',this)">Scanner</button>
    </div>
  </header>

  <main>
    <!-- COLLECTIE TAB -->
    <div id="tab-kelder">
      <div id="main-view">
        <div class="search-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="search-input" placeholder="Zoek drank, producent, regio" oninput="renderList()">
        </div>
        <div class="filter-pills">
          <button class="fpill active" onclick="setFilter(this,'')">Alles</button>
          <button class="fpill" onclick="setFilter(this,'Rood')">Rood</button>
          <button class="fpill" onclick="setFilter(this,'Wit')">Wit</button>
          <button class="fpill" onclick="setFilter(this,'Whisky')">Whisky</button>
          <button class="fpill" onclick="setFilter(this,'Rum')">Rum</button>
          <button class="fpill" onclick="setFilter(this,'Cognac')">Cognac</button>
          <button class="fpill" onclick="setFilter(this,'Gin')">Gin</button>
        </div>
        <div class="card-stack" id="wine-list"></div>
        <div class="stack-end"></div>
      </div>

    </div>

    <!-- LOGBOEK TAB -->
    <div id="tab-reviews" style="display:none">
      <div style="padding:20px 20px 10px">
        <div style="font-size:24px;font-weight:900;margin-bottom:4px">Logboek</div>
        <div style="font-size:12px;color:var(--muted)">Beoordeelde dranken</div>
      </div>
      <div id="reviews-list"></div>
    </div>

    <!-- SCANNER TAB -->
    <div id="tab-scanner" style="display:none">
      <div class="scanner-hero">
        <h2>Scanner</h2>
        <p>Foto een etiket en krijg direct info — druiven, regio, smaak en koopadvies.</p>
      </div>
      <div class="scan-btns">
        <button class="scan-big-btn" onclick="document.getElementById('sc-cam').click()">Maak foto</button>
        <button class="scan-big-btn" onclick="document.getElementById('sc-gal').click()">Kies foto</button>
      </div>
      <input type="file" id="sc-cam" accept="image/jpeg,image/png,image/webp" capture="environment" style="display:none" onchange="handleScanPhoto(this)">
      <input type="file" id="sc-gal" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleScanPhoto(this)">
      <div class="scan-preview-wrap" id="sc-preview-wrap">
        <img id="sc-preview-img" alt="preview">
        <button class="btn-scan-ai" onclick="doWinkelScan()">Analyseer etiket</button>
      </div>
      <div class="scan-result" id="sc-result">
        <div class="scan-result-card">
          <div class="src-name" id="sc-name"></div>
          <div class="src-meta" id="sc-meta"></div>
          <div id="sc-info"></div>
        </div>
        <div class="scan-actions">
          <button class="scan-action-btn" onclick="logTasting()">Noteer proeverij</button>
          <button class="scan-action-btn primary" onclick="addScannedToKelder()">+ Voeg toe</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Toevoegen</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Scan etiket</label>
        <div class="btn-scan-row">
          <button class="btn-scan" onclick="document.getElementById('inp-cam').click()">📷 Camera</button>
          <button class="btn-scan" onclick="document.getElementById('inp-gal').click()">🖼 Galerij</button>
        </div>
        <input type="file" id="inp-cam" accept="image/jpeg,image/png,image/webp" capture="environment" style="display:none" onchange="handlePhoto(this)">
        <input type="file" id="inp-gal" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handlePhoto(this)">
        <div class="ppw" id="ppw"><img id="pimg" alt="preview">
          <button class="btn-ai-fetch" onclick="scanLabel()">Herken etiket</button>
        </div>
        <div class="ai-prev" id="scan-prev"></div>
      </div>
      <div class="fg">
        <label class="fl">Naam</label>
        <input class="fi" id="f-name" placeholder="bijv. Deanston 12yr" autocomplete="off">
        <button class="btn-ai-fetch" onclick="fetchAI()">Haal info op via naam</button>
        <div class="ai-prev" id="ai-prev"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Type</label>
          <select class="fsel" id="f-type">
            <optgroup label="Wijn"><option>Rood</option><option>Wit</option><option>Rosé</option><option>Mousserende</option><option>Dessertwijn</option></optgroup>
            <optgroup label="Spirits"><option>Whisky</option><option>Rum</option><option>Cognac</option><option>Gin</option><option>Overig</option></optgroup>
          </select>
        </div>
        <div class="fg"><label class="fl">Jaar</label>
          <input class="fi" id="f-year" type="number" placeholder="2020" min="1800" max="2030">
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Producent</label>
          <input class="fi" id="f-producer" placeholder="bijv. Deanston">
        </div>
        <div class="fg"><label class="fl">Regio / Land</label>
          <input class="fi" id="f-region" placeholder="bijv. Highland, Schotland">
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Aantal</label>
          <input class="fi" id="f-bottles" type="number" value="1" min="0">
        </div>
        <div class="fg"><label class="fl">Prijs/fles (€)</label>
          <input class="fi" id="f-price" type="number" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Drink vanaf</label>
          <input class="fi" id="f-dfrom" type="number" placeholder="2024">
        </div>
        <div class="fg"><label class="fl">Drink voor</label>
          <input class="fi" id="f-dto" type="number" placeholder="2032">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Notitie</label>
        <textarea class="fta" id="f-notes" placeholder="Aroma, smaak, afdronk, gelegenheid..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete" id="btn-del" style="display:none" onclick="deleteWine()">Verwijder</button>
      <button class="btn-cancel" onclick="closeModal()">Annuleer</button>
      <button class="btn-save" onclick="saveWine()">Opslaan</button>
    </div>
  </div>
</div>

<!-- DRINK MODAL -->
<div class="modal-overlay" id="drink-modal">
  <div class="modal" style="min-height:auto;max-height:85dvh;margin-top:auto;border-radius:var(--r) var(--r) 0 0;">
    <div class="modal-header">
      <span class="modal-title">Loggen</span>
      <button class="modal-close" onclick="document.getElementById('drink-modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="drink-wine-id">
      <div class="fg">
        <label class="fl">Hoeveel gedronken</label>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px">
          <button class="drink-amount-btn active" onclick="setDrinkAmount(this,'glas')">Glas</button>
          <button class="drink-amount-btn" onclick="setDrinkAmount(this,'halve fles')">½ Fles</button>
          <button class="drink-amount-btn" onclick="setDrinkAmount(this,'fles')">Fles</button>
          <button class="drink-amount-btn" onclick="setDrinkAmount(this,'shot')">Shot</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Beoordeling</label>
        <div class="star-row">
          <button class="drink-star" onclick="setDrinkStar(1)">★</button>
          <button class="drink-star" onclick="setDrinkStar(2)">★</button>
          <button class="drink-star" onclick="setDrinkStar(3)">★</button>
          <button class="drink-star" onclick="setDrinkStar(4)">★</button>
          <button class="drink-star" onclick="setDrinkStar(5)">★</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Notitie</label>
        <textarea class="fta" id="drink-note" placeholder="Aroma, smaak, afdronk, gelegenheid..." style="min-height:100px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('drink-modal').classList.remove('open')">Annuleer</button>
      <button class="btn-save" onclick="saveDrinkLog()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var AAPI = 'https://yepcptjqjxjcblpozsia.supabase.co/functions/v1/claude-proxy';
var SB_URL = 'https://yepcptjqjxjcblpozsia.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllcGNwdGpxanhqY2JscG96c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDA1MTksImV4cCI6MjA5NDUxNjUxOX0.9NvfgUCEVXnyHuTBfF6IWCH89dWwfvt4STf1UAGSHh0';

var sb, wines = [], editId = null, starRating = 0, detailId = null;
var photoB64 = null, scPhotoB64 = null, scannedWine = null, scannedAiInfo = null;
var activeTypeFilter = '';
var currentDrinkRating = 0, currentDrinkAmount = 'glas';

// Card colors per type
var CARD_COLORS = {
  'rood':'#C20114','wit':'#2D4A6B','rose':'#7B2D5A','rosé':'#7B2D5A',
  'mousserende':'#1A5C3A','dessertwijn':'#6B3A1F',
  'whisky':'#C4922A','rum':'#3D1F6B','cognac':'#8B3A1F','gin':'#1F5A3A','overig':'#3A3A3A'
};

function typeKey(type) {
  var t = (type || 'overig').toLowerCase().trim();
  if (t === 'rosé' || t === 'rose') return 'rose';
  if (t === 'rood') return 'rood';
  if (t === 'wit') return 'wit';
  if (t === 'mousserende') return 'mousserende';
  if (t === 'dessertwijn') return 'dessertwijn';
  if (t === 'whisky') return 'whisky';
  if (t === 'rum') return 'rum';
  if (t === 'cognac') return 'cognac';
  if (t === 'gin') return 'gin';
  return 'overig';
}

function getCardColor(type) {
  return CARD_COLORS[(type||'').toLowerCase()] || '#3A3A3A';
}

function getUnit(type, count) {
  return count === 1 ? 'fles' : 'flessen';
}

function imgToJpeg(file, cb) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var d = e.target.result;
    if (!d || d.indexOf(',') === -1) { cb(null, null, 'Foto laden mislukt.'); return; }
    cb(d.split(',')[1], d);
  };
  reader.onerror = function() { cb(null, null, 'Foto laden mislukt.'); };
  reader.readAsDataURL(file);
}

// Shrink header on scroll
function initScrollHeader() {
  var hero = document.querySelector('.hero');
  var main = document.querySelector('main');
  if (!main || !hero) return;
  var heroH = hero.scrollHeight;
  var ticking = false;
  main.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        var progress = Math.min(1, main.scrollTop / 676);
        var h = Math.max(0, heroH * (1 - progress));
        var op = Math.max(0, 1 - progress * 1.4);
        hero.style.maxHeight = h + 'px';
        hero.style.opacity = op;
        hero.style.paddingBottom = (20 * (1 - progress)) + 'px';
        ticking = false;
      });
      ticking = true;
    }
  });
}

async function init() {
  sb = supabase.createClient(SB_URL, SB_KEY);
  document.getElementById('app').style.display = 'flex';
  setSS('spin', 'v0.39');
  await loadWines();
  setSS('ok', 'v0.39');
}

function setSS(cls, txt) {
  var dot = document.getElementById('sdot');
  dot.className = cls === 'ok' ? 'sync-dot' : ('sync-dot ' + cls);
  document.getElementById('slbl').textContent = txt;
}

async function loadWines() {
  var r = await sb.from('wines').select('*').order('created_at', { ascending: false });
  if (r.error) { setSS('err', 'fout'); return; }
  wines = r.data || [];
  renderAll();
}

async function saveToDB(w) {
  setSS('spin', 'opslaan...');
  var row = { name: w.name, type: w.type, year: w.year || null, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price || null,
    drink_from: w.drinkFrom || null, drink_to: w.drinkTo || null,
    rating: w.rating || null, notes: w.notes, ai_info: w.aiInfo || null };
  var r = w.id ? await sb.from('wines').update(row).eq('id', w.id) : await sb.from('wines').insert(row);
  if (r.error) { setSS('err', 'fout'); toast('Opslaan mislukt'); return false; }
  setSS('ok', 'v0.39'); await loadWines(); return true;
}

async function delFromDB(id) {
  await sb.from('wines').delete().eq('id', id);
  await loadWines();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  ['kelder','reviews','scanner'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'reviews') renderReviews();
}

function setFilter(btn, type) {
  activeTypeFilter = type;
  document.querySelectorAll('.fpill').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
}

function renderAll() { renderStats(); renderList(); }

function renderStats() {
  var total = wines.reduce(function(s, w) { return s + (w.bottles || 0); }, 0);
  var rated = wines.filter(function(w) { return w.rating; });
  var avg = rated.length ? (rated.reduce(function(s, w) { return s + w.rating; }, 0) / rated.length).toFixed(1) : '--';
  var val = wines.reduce(function(s, w) { return s + (w.price || 0) * (w.bottles || 0); }, 0);
  var logs = wines.filter(function(w) { return w.notes; }).length;
  document.getElementById('hero-num').innerHTML = total + ' <span>flessen</span>';
  document.getElementById('ms-score').textContent = avg;
  document.getElementById('ms-val').textContent = '€' + Math.round(val);
  document.getElementById('ms-logs').textContent = logs;
}

function renderList() {
  var q = (document.getElementById('search-input').value || '').toLowerCase();
  var list = wines.filter(function(w) {
    return [w.name, w.producer, w.region, w.year].join(' ').toLowerCase().indexOf(q) >= 0
      && (!activeTypeFilter || w.type === activeTypeFilter);
  });
  var el = document.getElementById('wine-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-title">' + (wines.length ? 'Geen resultaten' : 'Collectie is leeg') + '</div><div class="empty-sub">' + (wines.length ? 'Probeer een andere zoekterm.' : 'Voeg uw eerste fles toe.') + '</div></div>';
    return;
  }
  el.innerHTML = list.map(function(w, i) {
    var nextW = list[i + 1];
    var nextColor = nextW ? getCardColor(nextW.type) : '';
    var nextLabel = nextW ? (nextW.type || '').toUpperCase() : '';
    var tk = typeKey(w.type);
    var stars = w.rating ? '★'.repeat(w.rating) + '☆'.repeat(5 - w.rating) : '';
    var isAmber = tk === 'whisky' || tk === 'cognac' || tk === 'gin';
    var dark = isAmber ? ' style="color:#000"' : '';
    return '<div class="card-outer" id="card-' + w.id + '"' +
      (nextColor ? ' style="--next-color:' + nextColor + '"' : '') +
      (nextLabel ? ' data-next-label="' + nextLabel + '"' : '') + '>' +
      '<div class="drink-card dc-' + tk + '" onclick="toggleCard(\'' + w.id + '\')">' +
      '<div class="dc-header">' +
      '<span class="dc-type"' + dark + '>' + (w.type || '') + (w.region ? ' · ' + w.region : '') + '</span>' +
      '<span class="dc-badge"' + dark + '>' + (w.bottles || 0) + ' fl.</span>' +
      '</div>' +
      '<div class="dc-name"' + dark + '>' + (w.name || '') + (w.year ? ' <span style="font-weight:400;opacity:.6">' + w.year + '</span>' : '') + '</div>' +
      '<div class="dc-producer"' + dark + '>' + (w.producer || '') + '</div>' +
      '<div class="dc-footer">' +
      '<div><div class="dc-region"' + dark + '>' + (w.drink_from ? w.drink_from + '–' + (w.drink_to || '?') : (w.region || '')) + '</div></div>' +
      '<div>' +
      (w.rating ? '<div class="dc-score"' + dark + '>' + w.rating + '</div><div class="dc-stars"' + dark + '>' + stars + '</div>' : '<div class="dc-no-score">Niet beoordeeld</div>') +
      '</div></div></div></div>';
  }).join('');
}

var openCardId = null;

function toggleCard(id) {
  if (openCardId === id) {
    closeCard(id);
    return;
  }
  if (openCardId) closeCard(openCardId);
  openCardId = id;
  detailId = id;
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  var tk = typeKey(w.type);
  var color = getCardColor(w.type);
  var isAmber = (tk === 'whisky' || tk === 'cognac' || tk === 'gin');
  var textColor = isAmber ? '#000' : '#fff';
  var s5 = w.rating || 0;
  var sh = '★'.repeat(s5) + '☆'.repeat(5 - s5);
  var notesHtml = '';
  if (w.notes) {
    var entries = w.notes.split('\n---\n').reverse();
    notesHtml = entries.map(function(e) {
      var lines = e.split('\n');
      var first = lines[0] || '';
      var rest = lines.slice(1).join('\n');
      return '<div class="note-entry"><div class="note-date">' + first + '</div>' +
        (rest ? '<div class="note-text">' + rest + '</div>' : '') + '</div>';
    }).join('');
  }
  var notesHtml = '';
  if (w.notes) {
    w.notes.split('\n---\n').reverse().forEach(function(e) {
      var lines = e.split('\n');
      notesHtml += '<div class="note-entry"><div class="note-date">' + (lines[0]||'') + '</div>' +
        (lines.slice(1).join('\n') ? '<div class="note-text">' + lines.slice(1).join('<br>') + '</div>' : '') + '</div>';
    });
  }

  var expandHtml =
    '<div class="expand-inner">' +
    '<div class="expand-close"><button onclick="closeCard(\'' + id + '\')">✕ Sluiten</button></div>' +

    // AI info or fetch button
    '<div class="exp-section">' +
    '<div class="exp-label">Info</div>' +
    (w.ai_info
      ? '<div class="exp-ai-text" id="ai-det">' + w.ai_info + '</div>'
      : '<button class="exp-ai-btn" id="ai-det" onclick="loadAIDetail(\'' + id + '\')">Haal info op</button>') +
    '</div>' +

    // Data grid
    '<div class="exp-grid">' +
    '<div class="exp-item"><div class="exp-label">Score</div><div class="exp-val">' + (w.rating ? w.rating + '/5' : '—') + '</div></div>' +
    '<div class="exp-item"><div class="exp-label">Jaar</div><div class="exp-val">' + (w.year || '—') + '</div></div>' +
    '<div class="exp-item"><div class="exp-label">Flessen</div><div class="exp-val">' + (w.bottles||0) + '</div></div>' +
    '<div class="exp-item"><div class="exp-label">Prijs/fles</div><div class="exp-val">' + (w.price ? '€'+Number(w.price).toFixed(2) : '—') + '</div></div>' +
    (w.drink_from ? '<div class="exp-item"><div class="exp-label">Drinkvenster</div><div class="exp-val">' + w.drink_from + '–' + (w.drink_to||'?') + '</div></div>' : '') +
    '<div class="exp-item"><div class="exp-label">Waarde</div><div class="exp-val">' + (w.price ? '€'+((w.price)*(w.bottles||0)).toFixed(0) : '—') + '</div></div>' +
    '</div>' +

    // Stars
    '<div class="exp-section exp-stars-row">' +
    '<div class="exp-label">Beoordeling</div>' +
    '<div class="exp-stars">' + (w.rating ? '★'.repeat(w.rating)+'☆'.repeat(5-w.rating) : '☆☆☆☆☆') + '</div>' +
    '</div>' +

    // Notes
    (w.notes ? '<div class="exp-section"><div class="exp-label">Notities</div>' + notesHtml + '</div>' : '') +

    // Actions
    '<div class="exp-actions">' +
    '<button class="exp-btn" onclick="addFles(\'' + id + '\')">+ Fles</button>' +
    '<button class="exp-btn primary" onclick="drinkFles(\'' + id + '\')">Loggen</button>' +
    '<button class="exp-btn" onclick="openModal(\'' + id + '\')">Bewerk</button>' +
    (w.notes ? '<button class="exp-btn danger" onclick="clearNotes(\'' + id + '\')">Wis logs</button>' : '') +
    '</div>' +
    '</div>';

  var outer = document.getElementById('card-' + id);
  if (!outer) return;
  outer.classList.add('expanded');
  var panel = document.createElement('div');
  panel.id = 'expand-' + id;
  panel.className = 'card-expand';
  panel.style.setProperty('--expand-color', color);
  panel.innerHTML = expandHtml;
  outer.appendChild(panel);
  requestAnimationFrame(function() { panel.classList.add('open'); });
  setTimeout(function() { outer.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
  // Auto-fetch AI info if not yet loaded
  if (!w.ai_info) {
    setTimeout(function() { loadAIDetail(id); }, 300);
  }
}

function closeCard(id) {
  var panel = document.getElementById('expand-' + id);
  var outer = document.getElementById('card-' + id);
  if (panel) {
    panel.classList.remove('open');
    setTimeout(function() { if (panel.parentNode) panel.parentNode.removeChild(panel); }, 400);
  }
  if (outer) outer.classList.remove('expanded');
  if (openCardId === id) openCardId = null;
  detailId = null;
}

function showDetail(id) { toggleCard(id); }
function closeDetail() { if (openCardId) closeCard(openCardId); }

function closeDetail() {
  detailId = null;
  document.getElementById('main-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
}

async function drinkFles(id) {
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  document.getElementById('drink-modal').classList.add('open');
  document.getElementById('drink-wine-id').value = id;
  document.getElementById('drink-note').value = '';
  currentDrinkRating = 0; currentDrinkAmount = 'glas';
  document.querySelectorAll('.drink-amount-btn').forEach(function(b, i) { b.classList.toggle('active', i === 0); });
  document.querySelectorAll('.drink-star').forEach(function(b) { b.classList.remove('lit'); });
}

function setDrinkAmount(btn, amount) {
  currentDrinkAmount = amount;
  document.querySelectorAll('.drink-amount-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function setDrinkStar(n) {
  currentDrinkRating = n;
  document.querySelectorAll('.drink-star').forEach(function(b, i) { b.classList.toggle('lit', i < n); });
}

async function saveDrinkLog() {
  var id = document.getElementById('drink-wine-id').value;
  var note = document.getElementById('drink-note').value.trim();
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  var date = new Date().toLocaleDateString('nl-NL');
  var logEntry = '[' + date + '] ' + currentDrinkAmount;
  if (currentDrinkRating) logEntry += ' ' + Array(currentDrinkRating + 1).join('★') + Array(6 - currentDrinkRating).join('☆');
  if (note) logEntry += '\n' + note;
  w.notes = (w.notes ? w.notes + '\n---\n' : '') + logEntry;
  if (currentDrinkRating) w.rating = currentDrinkRating;
  if (currentDrinkAmount === 'fles') w.bottles = Math.max(0, (w.bottles || 0) - 1);
  document.getElementById('drink-modal').classList.remove('open');
  await saveToDB({ id: id, name: w.name, type: w.type, year: w.year, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price, drinkFrom: w.drink_from,
    drinkTo: w.drink_to, rating: w.rating, notes: w.notes, aiInfo: w.ai_info });
  if (detailId === id) showDetail(id);
}

async function addFles(id) {
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  w.bottles = (w.bottles || 0) + 1;
  await saveToDB({ id: id, name: w.name, type: w.type, year: w.year, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price, drinkFrom: w.drink_from,
    drinkTo: w.drink_to, rating: w.rating, notes: w.notes, aiInfo: w.ai_info });
  showDetail(id);
}

async function clearNotes(id) {
  if (!confirm('Alle notities verwijderen?')) return;
  var w = wines.find(function(x) { return x.id === id; });
  if (!w) return;
  await saveToDB({ id: id, name: w.name, type: w.type, year: w.year, producer: w.producer,
    region: w.region, bottles: w.bottles, price: w.price, drinkFrom: w.drink_from,
    drinkTo: w.drink_to, rating: w.rating, notes: '', aiInfo: w.ai_info });
  showDetail(id);
}

async function loadAIDetail(id) {
  var w = wines.find(function(x) { return x.id === id; });
  var box = document.getElementById('ai-det');
  if (!box) return;
  box.innerHTML = '<span class="loading-txt">Info ophalen...</span>';
  var prompt = 'Vertel in het Nederlands over: ' + (w.name || '') + ' ' + (w.year || '') + ' van ' + (w.producer || '') + ', ' + (w.region || '') + ', type: ' + (w.type || '') + '. Behandel: herkomst, druivenrassen of granen, smaakprofiel, aroma, afdronk, serveertemperatuur en spijscombinaties. Schrijf lopende tekst, max 120 woorden. Eindig met een volledige zin.';
  var info = await claudeText(prompt, 1500);
  if (info) {
    box.className = 'exp-ai-text';
    box.innerHTML = info;
    await sb.from('wines').update({ ai_info: info }).eq('id', id);
    var idx = wines.findIndex(function(x) { return x.id === id; });
    if (idx >= 0) wines[idx].ai_info = info;
  } else {
    box.innerHTML = '<span class="loading-txt">Niet beschikbaar.</span>';
  }
}

function renderReviews() {
  var rated = wines.filter(function(w) { return w.rating && w.notes; }).sort(function(a, b) { return b.rating - a.rating; });
  var el = document.getElementById('reviews-list');
  if (!rated.length) {
    el.innerHTML = '<div class="empty"><div class="empty-title">Geen logs</div><div class="empty-sub">Log een drank om hier te verschijnen.</div></div>';
    return;
  }
  el.innerHTML = rated.map(function(w) {
    return '<div class="log-card" onclick="goToDetail(\'' + w.id + '\')">' +
      '<div class="lc-name">' + (w.name || '') + (w.year ? ' ' + w.year : '') + '</div>' +
      '<div class="lc-meta">' + (w.type || '') + (w.producer ? ' · ' + w.producer : '') + '</div>' +
      '<div class="lc-stars">' + '★'.repeat(w.rating) + '☆'.repeat(5 - w.rating) + ' ' + w.rating + '/5</div>' +
      '<div class="lc-text">' + (w.notes || '').split('\n---\n')[0].replace(/\n/g, ' ').substring(0, 120) + '</div>' +
      '</div>';
  }).join('');
}

function goToDetail(id) {
  document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', i === 0); });
  ['kelder','reviews','scanner'].forEach(function(t, i) {
    document.getElementById('tab-' + t).style.display = i === 0 ? 'block' : 'none';
  });
  setTimeout(function() { toggleCard(id); }, 100);
}

function openModal(id) {
  editId = id || null; starRating = 0;
  document.getElementById('modal-title').textContent = id ? 'Bewerken' : 'Toevoegen';
  document.getElementById('btn-del').style.display = id ? 'block' : 'none';
  document.getElementById('scan-prev').className = 'ai-prev';
  document.getElementById('ai-prev').className = 'ai-prev';
  photoB64 = null;
  document.getElementById('ppw').style.display = 'none';
  document.getElementById('inp-cam').value = '';
  document.getElementById('inp-gal').value = '';
  if (id) {
    var w = wines.find(function(x) { return x.id === id; });
    document.getElementById('f-name').value = w.name || '';
    document.getElementById('f-type').value = w.type || 'Rood';
    document.getElementById('f-year').value = w.year || '';
    document.getElementById('f-producer').value = w.producer || '';
    document.getElementById('f-region').value = w.region || '';
    document.getElementById('f-bottles').value = w.bottles || 1;
    document.getElementById('f-price').value = w.price || '';
    document.getElementById('f-dfrom').value = w.drink_from || '';
    document.getElementById('f-dto').value = w.drink_to || '';
    document.getElementById('f-notes').value = w.notes || '';
    starRating = w.rating || 0;
  } else {
    ['f-name','f-year','f-producer','f-region','f-price','f-dfrom','f-dto','f-notes'].forEach(function(i) { document.getElementById(i).value = ''; });
    document.getElementById('f-type').value = 'Rood';
    document.getElementById('f-bottles').value = 1;
    starRating = 0;
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function handlePhoto(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    photoB64 = dataUrl.split(',')[1];
    document.getElementById('pimg').src = dataUrl;
    document.getElementById('ppw').style.display = 'block';
    document.getElementById('scan-prev').className = 'ai-prev';
  };
  reader.readAsDataURL(file);
}

async function scanLabel() {
  if (!photoB64) return;
  var el = document.getElementById('scan-prev');
  el.className = 'ai-prev show'; el.textContent = 'Etiket herkennen...';
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY },
      body: JSON.stringify({ model: 'gemini-2.5-flash', max_tokens: 600,
        system: 'Analyseer het etiket. Antwoord ALLEEN met JSON: {"name":"...","producer":"...","region":"...","year":null,"type":"Rood of Wit of Rose of Mousserende of Dessertwijn of Whisky of Rum of Cognac of Gin of Overig"}',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: photoB64 } },
          { type: 'text', text: 'Wat staat er op dit etiket? Geef JSON.' }
        ]}]})});
    var data = await res.json();
    if (data.error) { el.textContent = 'Fout: ' + data.error.message; return; }
    var txt = data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : '';
    var w; try { var m = txt.match(/\{[\s\S]*\}/); w = JSON.parse(m ? m[0] : txt); } catch(e) { el.textContent = txt; return; }
    if (!w.name && w.producer) w.name = w.producer;
    if (w.name) document.getElementById('f-name').value = w.name;
    if (w.producer) document.getElementById('f-producer').value = w.producer;
    if (w.region) document.getElementById('f-region').value = w.region;
    if (w.year) document.getElementById('f-year').value = w.year;
    if (w.type) document.getElementById('f-type').value = w.type;
    el.textContent = 'Gevonden: ' + [w.name, w.producer, w.region, w.year].filter(Boolean).join(', ');
    toast('Etiket herkend');
  } catch(e) { el.textContent = 'Fout: ' + e.message; }
}

async function fetchAI() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Vul eerst een naam in.'); return; }
  var el = document.getElementById('ai-prev');
  el.className = 'ai-prev show'; el.textContent = 'Info ophalen...';
  var info = await claudeText('Vertel beknopt over: "' + name + '". Geef: druivenras of graan, regio, smaakprofiel (2 zinnen), serveertemperatuur. In het Nederlands, max 80 woorden.');
  el.textContent = info || 'Geen info beschikbaar.';
}

async function saveWine() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Naam is verplicht.'); return; }
  var btn = document.querySelector('#modal .btn-save');
  btn.textContent = 'Opslaan...'; btn.disabled = true;
  var existingAI = editId
    ? ((wines.find(function(w) { return w.id === editId; }) || {}).ai_info || null)
    : (scannedAiInfo || null);
  scannedAiInfo = null; // reset after use
  var ok = await saveToDB({ id: editId || null, name: name,
    type: document.getElementById('f-type').value,
    year: parseInt(document.getElementById('f-year').value) || null,
    producer: document.getElementById('f-producer').value,
    region: document.getElementById('f-region').value,
    bottles: parseInt(document.getElementById('f-bottles').value) || 1,
    price: parseFloat(document.getElementById('f-price').value) || null,
    drinkFrom: parseInt(document.getElementById('f-dfrom').value) || null,
    drinkTo: parseInt(document.getElementById('f-dto').value) || null,
    rating: starRating || null,
    notes: document.getElementById('f-notes').value,
    aiInfo: existingAI });
  btn.textContent = 'Opslaan'; btn.disabled = false;
  if (ok) {
    closeModal(); toast('Opgeslagen');
    if (detailId) showDetail(detailId);
    if (!existingAI) {
      var savedWine = wines[0];
      if (savedWine && !savedWine.ai_info) {
        claudeText('Vertel in het Nederlands over: "' + name + '" type: ' + document.getElementById('f-type').value + '. Behandel: herkomst, smaakprofiel, serveertemperatuur. Max 100 woorden.').then(function(info) {
          if (info && savedWine.id) {
            sb.from('wines').update({ ai_info: info }).eq('id', savedWine.id).then(function() { loadWines(); });
          }
        });
      }
    }
  }
}

async function deleteWine() {
  if (!confirm('Verwijderen?')) return;
  await delFromDB(editId);
  closeModal(); closeDetail(); toast('Verwijderd');
}

function handleScanPhoto(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    scPhotoB64 = e.target.result.split(',')[1];
    document.getElementById('sc-preview-img').src = e.target.result;
    document.getElementById('sc-preview-wrap').style.display = 'block';
    document.getElementById('sc-result').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function doWinkelScan() {
  if (!scPhotoB64) return;
  var btn = document.querySelector('#sc-preview-wrap .btn-scan-ai');
  btn.textContent = 'Analyseren...';
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY },
      body: JSON.stringify({ model: 'gemini-2.5-flash', max_tokens: 2000,
        system: 'Analyseer het etiket. Antwoord ALLEEN met JSON: {"name":"","producer":"","region":"","year":null,"type":"Rood/Wit/Rose/Mousserende/Dessertwijn/Whisky/Rum/Cognac/Gin/Overig","druivenras":"","smaakprofiel":"","advies":"","serveertemperatuur":"","spijscombinaties":""}',
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: scPhotoB64 } },
          { type: 'text', text: 'Analyseer dit etiket volledig.' }
        ]}]})});
    var data = await res.json();
    if (data.error) { toast('Fout: ' + data.error.message); btn.textContent = 'Analyseer etiket'; return; }
    var txt = data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : '';
    var w; try { var m = txt.match(/\{[\s\S]*\}/); w = JSON.parse(m ? m[0] : txt); } catch(e) { toast('Kon etiket niet lezen'); btn.textContent = 'Analyseer etiket'; return; }
    if (!w.name && w.producer) w.name = w.producer;
    scannedWine = w;
    document.getElementById('sc-name').textContent = (w.name || 'Onbekend') + (w.year ? ' ' + w.year : '');
    document.getElementById('sc-meta').textContent = [w.producer, w.region, w.type].filter(Boolean).join(' · ');
    var info = '';
    if (w.geschatte_prijs_min && w.geschatte_prijs_max) info += '<div class="sc-block-row" style="background:rgba(196,146,42,.08)"><div class="sc-label" style="color:var(--gold)">Geschatte prijs</div><div class="sc-val" style="color:var(--gold);font-weight:700">€' + w.geschatte_prijs_min + ' – €' + w.geschatte_prijs_max + '</div></div>';
    if (w.druivenras) info += '<div class="sc-block"><div class="sc-label">Druivenras / Graan</div><div class="sc-val">' + w.druivenras + '</div></div>';
    if (w.smaakprofiel) info += '<div class="sc-block"><div class="sc-label">Smaakprofiel</div><div class="sc-val">' + w.smaakprofiel + '</div></div>';
    if (w.serveertemperatuur) info += '<div class="sc-block-row"><div class="sc-label">Serveer</div><div class="sc-val">' + w.serveertemperatuur + '</div></div>';
    if (w.spijscombinaties) info += '<div class="sc-block-row"><div class="sc-label">Past bij</div><div class="sc-val">' + w.spijscombinaties + '</div></div>';
    if (w.advies) info += '<div class="sc-block" style="background:rgba(196,146,42,.06)"><div class="sc-label">Advies</div><div class="sc-val">' + w.advies + '</div></div>';
    document.getElementById('sc-info').innerHTML = info || '<div class="sc-block"><div class="sc-val" style="opacity:.4">Geen info beschikbaar.</div></div>';
    document.getElementById('sc-result').style.display = 'block';
    btn.textContent = 'Analyseer etiket';
  } catch(e) { toast('Fout: ' + e.message); btn.textContent = 'Analyseer etiket'; }
}

function logTasting() {
  if (!scannedWine) return;
  var name = scannedWine.name || 'Onbekend';
  var note = prompt('Proefnotitie voor ' + name + ':');
  var date = new Date().toLocaleDateString('nl-NL');
  var tastings = JSON.parse(localStorage.getItem('sectio_tastings') || '[]');
  tastings.unshift({ date: date, name: name, note: note, type: scannedWine.type, region: scannedWine.region });
  localStorage.setItem('sectio_tastings', JSON.stringify(tastings.slice(0, 100)));
  toast('Proeverij genoteerd');
}

function addScannedToKelder() {
  if (!scannedWine) return;
  document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', i === 0); });
  ['kelder','reviews','scanner'].forEach(function(t, i) {
    document.getElementById('tab-' + t).style.display = i === 0 ? 'block' : 'none';
  });
  // Build AI info text from scan data
  var aiParts = [];
  if (scannedWine.druivenras) aiParts.push(scannedWine.druivenras + '.');
  if (scannedWine.smaakprofiel) aiParts.push(scannedWine.smaakprofiel);
  if (scannedWine.serveertemperatuur) aiParts.push('Serveer op ' + scannedWine.serveertemperatuur + '.');
  if (scannedWine.spijscombinaties) aiParts.push('Past bij: ' + scannedWine.spijscombinaties + '.');
  if (scannedWine.advies) aiParts.push(scannedWine.advies);
  scannedAiInfo = aiParts.length ? aiParts.join(' ') : null;

  // Estimated price midpoint
  var estPrice = null;
  if (scannedWine.geschatte_prijs_min && scannedWine.geschatte_prijs_max) {
    estPrice = ((scannedWine.geschatte_prijs_min + scannedWine.geschatte_prijs_max) / 2).toFixed(2);
  }

  openModal();
  document.getElementById('f-name').value = scannedWine.name || '';
  document.getElementById('f-producer').value = scannedWine.producer || '';
  document.getElementById('f-region').value = scannedWine.region || '';
  document.getElementById('f-year').value = scannedWine.year || '';
  if (scannedWine.type) document.getElementById('f-type').value = scannedWine.type;
  if (estPrice) document.getElementById('f-price').value = estPrice;
}

async function claudeText(prompt, maxTok) {
  try {
    var res = await fetch(AAPI, { method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY, 'apikey': SB_KEY },
      body: JSON.stringify({ model: 'gemini-2.5-flash', max_tokens: maxTok || 500,
        system: 'Je bent een drank expert. Geef praktische info in het Nederlands. Geen bullet points, gewoon lopende tekst.',
        messages: [{ role: 'user', content: prompt }] }) });
    var data = await res.json();
    return data.content ? data.content.map(function(c) { return c.text || ''; }).join('') : null;
  } catch(e) { return null; }
}

function toast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

init().then(function() { initScrollHeader(); });
</script>
